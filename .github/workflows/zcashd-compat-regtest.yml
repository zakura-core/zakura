name: zcashd-compat Regtest

# Runs the managed zcashd-compat Regtest integration suite.
#
# The test harness spawns a fresh zakurad and zcashd on randomised ports, so no
# external infrastructure is required.
#
# TEMPORARILY manual-only: the suite now requires a P2P-sidecar zcashd build
# (miner RPCs removed, -regtestacceptunvalidatedpow support), but the managed
# download manifest still pins the previous RPC-ingest build. Re-enable the
# push trigger once a sidecar zcashd release is cut and
# zakurad/zcashd-compat-manifest.json is bumped. Until then run locally with
# `make compat-test-regtest TEST_ZCASHD_PATH=/path/to/sidecar/zcashd`.
on:
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.head_ref || github.run_id }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1
  RUST_LIB_BACKTRACE: 1
  RUST_LOG: info
  COLORBT_SHOW_HIDDEN: 1

jobs:
  zcashd-compat-regtest:
    name: zcashd-compat regtest suite
    permissions:
      contents: read
    runs-on: ubuntu-latest
    timeout-minutes: 120

    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 #v7.0.0
        with:
          persist-credentials: false

      - uses: actions-rust-lang/setup-rust-toolchain@166cdcfd11aee3cb47222f9ddb555ce30ddb9659 #v1.17.0
        with:
          toolchain: stable
          cache-key: zcashd-compat-regtest
          cache-on-failure: true
          cache-save-if: ${{ github.ref == 'refs/heads/main' }}

      - uses: taiki-e/install-action@43aecc8d72668fbcfe75c31400bc4f890f1c5853 #v2.83.2
        with:
          tool: cargo-nextest

      - uses: ./.github/actions/setup-zakura-build

      # Uses the embedded zcashd download (TEST_ZCASHD_PATH unset).
      - name: Run zcashd-compat regtest suite
        run: make compat-test-regtest
