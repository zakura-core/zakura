# Build one immutable Mainnet publisher image from reviewed main.
name: Publish release-state publisher image

on:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: publish-release-state-publisher-image
  cancel-in-progress: false

jobs:
  publish:
    name: Build and publish amd64 image
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    environment: release
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 #v7.0.0
        with:
          persist-credentials: false
          ref: ${{ github.sha }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@bb05f3f5519dd87d3ba754cc423b652a5edd6d2c #v4.2.0

      - name: Login to DockerHub
        uses: docker/login-action@af1e73f918a031802d376d3c8bbc3fe56130a9b0 #v4.4.0
        with:
          username: valaroman
          password: ${{ secrets.DOCKERHUB_TOKEN_ZAKURA }}

      - name: Build and publish
        id: build
        uses: docker/build-push-action@53b7df96c91f9c12dcc8a07bcb9ccacbed38856a #v7.3.0
        with:
          context: .
          file: docker/Dockerfile
          target: runtime-release-state-publisher
          platforms: linux/amd64
          push: true
          tags: zakuracore/zakura:publisher-${{ github.sha }}
          build-args: |
            FEATURES=${{ vars.RUST_PROD_FEATURES || 'default-release-binaries' }}
            SHORT_SHA=${{ github.sha }}
            IMAGE_VERSION=publisher-${{ github.sha }}
          provenance: mode=max
          sbom: true

      - name: Record immutable deployment reference
        env:
          IMAGE_DIGEST: ${{ steps.build.outputs.digest }}
        run: |
          set -euo pipefail
          [[ "$IMAGE_DIGEST" =~ ^sha256:[0-9a-f]{64}$ ]]
          image="zakuracore/zakura@${IMAGE_DIGEST}"
          docker buildx imagetools inspect "$image" >/dev/null
          docker pull --platform linux/amd64 "$image"
          docker run --rm --platform linux/amd64 \
            --entrypoint /usr/local/bin/zakurad "$image" --version
          docker run --rm --platform linux/amd64 \
            --entrypoint /usr/local/bin/zakura-release-state "$image" --help
          printf 'Use the same reviewed image for the node and exporter:\n\n    %s\n' \
            "$image" >> "$GITHUB_STEP_SUMMARY"
