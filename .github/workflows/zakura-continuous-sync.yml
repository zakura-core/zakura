name: Zakura continuous genesis sync fleet

on:
  workflow_dispatch:
    inputs:
      action:
        description: "Operation to run"
        required: true
        type: choice
        default: status
        options:
          - deploy
          - status
          - resume
          - audit
      node:
        description: "Optional node name; blank targets the whole fleet"
        required: false
        type: string
        default: ""
      no_start:
        description: "For deploy: install files but do not start the controller"
        required: false
        type: boolean
        default: false
  schedule:
    - cron: "17,47 * * * *"

permissions:
  contents: read

concurrency:
  group: zakura-continuous-sync
  cancel-in-progress: false

jobs:
  fleet:
    name: "Continuous sync ${{ github.event_name == 'schedule' && 'audit' || inputs.action }}"
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v4
        with:
          persist-credentials: false

      - name: Resolve operation
        run: |
          set -euo pipefail
          if [ "${{ github.event_name }}" = "schedule" ]; then
            {
              echo "ACTION=audit"
              echo "NODE="
              echo "NO_START=false"
            } >> "$GITHUB_ENV"
          else
            {
              echo "ACTION=${{ inputs.action }}"
              echo "NODE=${{ inputs.node }}"
              echo "NO_START=${{ inputs.no_start }}"
            } >> "$GITHUB_ENV"
          fi

      - name: Configure SSH
        env:
          DO_SSH_PRIVATE_KEY: ${{ secrets.DO_SSH_PRIVATE_KEY }}
        run: |
          set -euo pipefail
          if [ -z "${DO_SSH_PRIVATE_KEY}" ]; then
            echo "::error::DO_SSH_PRIVATE_KEY is required for the continuous sync fleet"
            exit 1
          fi

          mapfile -t ssh_targets < <(
            python3 - <<'PY'
          import tomllib

          with open("deploy/continuous-sync/nodes.toml", "rb") as config_file:
              config = tomllib.load(config_file)

          for node in config.get("nodes", []):
              print(node["ssh_string"])
          PY
          )
          if [ "${#ssh_targets[@]}" -eq 0 ]; then
            echo "::error::No continuous sync nodes found in nodes.toml"
            exit 1
          fi

          install -d -m 700 ~/.ssh
          : > ~/.ssh/known_hosts
          for target in "${ssh_targets[@]}"; do
            host="${target##*@}"
            ssh-keyscan -T 30 -H "$host" >> ~/.ssh/known_hosts
          done
          chmod 600 ~/.ssh/known_hosts

          install -m 600 /dev/null ~/.ssh/zakura-continuous-sync
          printf '%s\n' "${DO_SSH_PRIVATE_KEY}" > ~/.ssh/zakura-continuous-sync
          ssh-keygen -y -f ~/.ssh/zakura-continuous-sync >/dev/null
          {
            printf 'Host'
            for target in "${ssh_targets[@]}"; do
              printf ' %s' "${target##*@}"
            done
            printf '\n  IdentityFile ~/.ssh/zakura-continuous-sync\n'
            printf '  IdentitiesOnly yes\n'
          } > ~/.ssh/config
          chmod 600 ~/.ssh/config

          for target in "${ssh_targets[@]}"; do
            if ! ssh -o BatchMode=yes -o ConnectTimeout=15 "$target" true; then
              echo "::error::Continuous sync SSH authentication failed for $target; verify the DO_SSH_PRIVATE_KEY secret and zebra-ci authorized key"
              exit 1
            fi
          done

      - name: Deploy controllers
        if: env.ACTION == 'deploy'
        run: |
          set -euo pipefail
          args=(deploy)
          if [ "${NO_START}" = "true" ]; then
            args+=(--no-start)
          fi
          if [ -n "${NODE}" ]; then
            python3 deploy/continuous-sync/deploy.py --node "${NODE}" "${args[@]}"
          else
            python3 deploy/continuous-sync/deploy.py "${args[@]}"
          fi

      - name: Show status
        if: env.ACTION == 'status'
        run: |
          set -euo pipefail
          if [ -n "${NODE}" ]; then
            python3 deploy/continuous-sync/deploy.py --node "${NODE}" status
          else
            python3 deploy/continuous-sync/deploy.py status
          fi

      - name: Resume controllers
        if: env.ACTION == 'resume'
        run: |
          set -euo pipefail
          if [ -z "${NODE}" ]; then
            echo "::error::resume requires a single node input"
            exit 1
          fi
          python3 deploy/continuous-sync/deploy.py --node "${NODE}" resume

      - name: Audit controllers
        if: env.ACTION == 'audit'
        env:
          SLACK_WEB_HOOK: ${{ secrets.SLACK_WEB_HOOK }}
        run: |
          set -euo pipefail
          args=(audit)
          if [ -n "${NODE}" ]; then
            python3 deploy/continuous-sync/deploy.py --node "${NODE}" "${args[@]}"
          else
            python3 deploy/continuous-sync/deploy.py "${args[@]}"
          fi
