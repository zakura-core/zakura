# This workflow is the only supported path for creating v* release tags.
# It builds and verifies every release asset before a protected environment
# allows the release GitHub App to publish a draft and create the immutable tag.
name: Create release

on:
  workflow_dispatch:
    inputs:
      release_tag:
        description: "Release tag, matching the zakura package version (for example v1.0.0-rc2)"
        required: true
        type: string
      allow_bootstrap_release_state:
        description: "Emergency override: accept legacy-bootstrap Mainnet release state (note it in the release PR)"
        required: false
        default: false
        type: boolean

permissions:
  contents: read

concurrency:
  group: create-release
  cancel-in-progress: false

jobs:
  validate:
    name: Validate release
    runs-on: ubuntu-latest
    outputs:
      release_tag: ${{ steps.validate.outputs.release_tag }}
      target_sha: ${{ steps.validate.outputs.target_sha }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 #v7.0.0
        with:
          persist-credentials: false
          ref: ${{ github.sha }}

      - uses: actions-rust-lang/setup-rust-toolchain@166cdcfd11aee3cb47222f9ddb555ce30ddb9659 #v1.17.0
        with:
          toolchain: stable

      - name: Validate source, tag, and package version
        id: validate
        env:
          RELEASE_TAG: ${{ inputs.release_tag }}
          SOURCE_REF: ${{ github.ref }}
          TARGET_SHA: ${{ github.sha }}
          # The documented emergency override for scripts/check-release-state.sh.
          ZAKURA_ALLOW_BOOTSTRAP_RELEASE_STATE: ${{ inputs.allow_bootstrap_release_state && '1' || '0' }}
        run: |
          set -euo pipefail

          if [ "$SOURCE_REF" != "refs/heads/main" ]; then
            echo "Create release must be dispatched from the main branch, not ${SOURCE_REF}." >&2
            exit 1
          fi

          # This validates only release state committed to the source ref.
          # Resolving the moving R2 pointer belongs to update-release-state.yml.
          make pre-release \
            RELEASE_TAG="$RELEASE_TAG" \
            PRE_RELEASE_WARN_CRATE_VERSION_BUMPS=0

          echo "release_tag=$RELEASE_TAG" >> "$GITHUB_OUTPUT"
          echo "target_sha=$TARGET_SHA" >> "$GITHUB_OUTPUT"

  build-assets:
    name: Build and verify release assets
    needs: [validate]
    uses: ./.github/workflows/release-binaries.yml
    # The nested publish-zakurad-assets job declares contents: write, and a
    # called workflow may not request more than the caller grants. The staging
    # run never uses the write scope: it skips every release-mutating step,
    # and GITHUB_TOKEN cannot create v* tags (ruleset bypass is app-only).
    permissions:
      contents: write
      id-token: write
      attestations: write
    with:
      release_tag: ${{ needs.validate.outputs.release_tag }}
      checkout_ref: ${{ needs.validate.outputs.target_sha }}
      stage_release_assets: true

  publish:
    name: Publish release and create tag
    runs-on: ubuntu-latest
    needs: [validate, build-assets]
    environment: release
    steps:
      - name: Download staged release assets
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c #v8.0.1
        with:
          name: staged-release-assets
          path: ./assets

      - name: Verify staged release assets
        env:
          RELEASE_TAG: ${{ needs.validate.outputs.release_tag }}
          REPOSITORY: ${{ github.repository }}
        run: |
          set -euo pipefail

          expected_assets=(
            "SHA256SUMS.txt"
            "install-zakura.sh"
            "zakurad-${RELEASE_TAG}-linux-aarch64.tar.gz"
            "zakurad-${RELEASE_TAG}-linux-x86_64.tar.gz"
            "zakurad-manifest-${RELEASE_TAG}.json"
          )
          unexpected_entry="$(
            find ./assets -mindepth 1 -maxdepth 1 ! -type f -print -quit
          )"
          if [ -n "$unexpected_entry" ]; then
            echo "Staged assets contain a non-file entry: ${unexpected_entry}" >&2
            exit 1
          fi
          printf '%s\n' "${expected_assets[@]}" | sort > ./expected-assets.txt
          find ./assets -maxdepth 1 -type f -printf '%f\n' | sort > ./actual-assets.txt
          diff --unified ./expected-assets.txt ./actual-assets.txt

          expected_payloads=(
            "install-zakura.sh"
            "zakurad-${RELEASE_TAG}-linux-aarch64.tar.gz"
            "zakurad-${RELEASE_TAG}-linux-x86_64.tar.gz"
            "zakurad-manifest-${RELEASE_TAG}.json"
          )
          printf '%s\n' "${expected_payloads[@]}" | sort > ./expected-payloads.txt
          # SHA256SUMS.txt entries are ./-prefixed (sha256sum ./*).
          awk '{print $2}' ./assets/SHA256SUMS.txt | sed 's|^\./||' | sort > ./checksummed-payloads.txt
          diff --unified ./expected-payloads.txt ./checksummed-payloads.txt
          (
            cd ./assets
            sha256sum --check --strict SHA256SUMS.txt
          )

          RELEASE_TAG="$RELEASE_TAG" REPOSITORY="$REPOSITORY" python3 - <<'PY'
          import hashlib
          import json
          import os
          import re
          from pathlib import Path

          release_tag = os.environ["RELEASE_TAG"]
          repository = os.environ["REPOSITORY"]
          installer = Path("./assets/install-zakura.sh").read_text(encoding="utf-8")
          assignments = re.findall(
              r'^ZAKURA_RELEASE_TAG="([^"]*)"$',
              installer,
              flags=re.MULTILINE,
          )
          if assignments != [release_tag]:
              raise SystemExit(
                  f"Installer release tag assignments {assignments!r} do not match {release_tag}."
              )
          archive_checksums = re.findall(
              r'^ZAKURA_ARCHIVE_SHA256="([^"]*)"$',
              installer,
              flags=re.MULTILINE,
          )
          checksum_lines = Path("./assets/SHA256SUMS.txt").read_text(
              encoding="utf-8"
          ).splitlines()
          checksums = {
              filename.removeprefix("./"): digest
              for digest, filename in (line.split(maxsplit=1) for line in checksum_lines)
          }
          x86_archive = f"zakurad-{release_tag}-linux-x86_64.tar.gz"
          if archive_checksums != [checksums[x86_archive]]:
              raise SystemExit(
                  "Installer archive checksum does not match the x86_64 release archive."
              )

          manifest_path = Path(f"./assets/zakurad-manifest-{release_tag}.json")
          manifest = json.loads(manifest_path.read_text(encoding="utf-8"))
          if manifest.get("release_tag") != release_tag:
              raise SystemExit("Manifest release tag does not match the requested release.")
          if manifest.get("repository") != repository:
              raise SystemExit("Manifest repository does not match this repository.")

          expected_platforms = {
              "linux-aarch64": "aarch64-unknown-linux-gnu",
              "linux-x86_64": "x86_64-unknown-linux-gnu",
          }
          artifacts = manifest.get("artifacts", [])
          if manifest.get("schema_version") != 1 or len(artifacts) != len(expected_platforms):
              raise SystemExit("Manifest schema or artifact count is invalid.")

          seen_platforms = set()
          for artifact in artifacts:
              platform_id = artifact.get("platform_id")
              target_triple = expected_platforms.get(platform_id)
              if target_triple is None or platform_id in seen_platforms:
                  raise SystemExit(f"Unexpected or duplicate platform {platform_id!r}.")
              seen_platforms.add(platform_id)

              archive = f"zakurad-{release_tag}-{platform_id}.tar.gz"
              archive_path = Path("./assets") / archive
              expected_url = (
                  f"https://github.com/{repository}/releases/download/"
                  f"{release_tag}/{archive}"
              )
              if artifact.get("archive") != archive:
                  raise SystemExit(f"Manifest archive does not match {platform_id}.")
              if artifact.get("target_triple") != target_triple:
                  raise SystemExit(f"Manifest target triple does not match {platform_id}.")
              if artifact.get("archive_member_binary_path") != "./bin/zakurad":
                  raise SystemExit(f"Manifest binary path does not match {platform_id}.")
              if artifact.get("url") != expected_url:
                  raise SystemExit(f"Manifest URL does not match {platform_id}.")
              if artifact.get("size") != archive_path.stat().st_size:
                  raise SystemExit(f"Manifest archive size does not match {platform_id}.")
              digest = hashlib.sha256(archive_path.read_bytes()).hexdigest()
              if artifact.get("sha256") != digest:
                  raise SystemExit(f"Manifest checksum does not match {platform_id}.")
          PY

      - name: Create release GitHub App token
        id: app-token
        uses: actions/create-github-app-token@bcd2ba49218906704ab6c1aa796996da409d3eb1 #v3.2.0
        with:
          client-id: ${{ vars.RELEASE_APP_CLIENT_ID }}
          private-key: ${{ secrets.RELEASE_APP_PRIVATE_KEY }}
          permission-contents: write

      - name: Publish staged release
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
          RELEASE_TAG: ${{ needs.validate.outputs.release_tag }}
          REPOSITORY: ${{ github.repository }}
          TARGET_SHA: ${{ needs.validate.outputs.target_sha }}
        run: |
          set -euo pipefail

          # On HTTP errors `gh api` prints the JSON error body to stdout, so
          # branch on the exit status instead of the captured output, and only
          # treat a 404 (tag does not exist yet) as the create-tag path.
          ref_status=0
          ref_json="$(gh api "repos/${REPOSITORY}/git/ref/tags/${RELEASE_TAG}" 2>/dev/null)" || ref_status=$?
          if [ "$ref_status" -eq 0 ]; then
            existing_sha="$(echo "$ref_json" | jq -r '.object.sha')"
            if [ "$existing_sha" != "$TARGET_SHA" ]; then
              echo "Tag ${RELEASE_TAG} already points to ${existing_sha}, not ${TARGET_SHA}." >&2
              exit 1
            fi
          elif [ "$(echo "$ref_json" | jq -r '.status? // empty' 2>/dev/null)" != "404" ]; then
            echo "Failed to look up tag ${RELEASE_TAG}: ${ref_json}" >&2
            exit 1
          fi

          releases="$(
            gh api --paginate --slurp \
              "repos/${REPOSITORY}/releases?per_page=100"
          )"
          published_count="$(
            echo "$releases" | jq --arg tag "$RELEASE_TAG" \
              '[.[][] | select(.tag_name == $tag and .draft == false)] | length'
          )"
          if [ "$published_count" -gt 0 ]; then
            echo "Release ${RELEASE_TAG} is already published; nothing to do."
            exit 0
          fi

          draft_id="$(
            echo "$releases" | jq -r --arg tag "$RELEASE_TAG" \
              'first(.[][] | select(.tag_name == $tag and .draft == true)).id // empty'
          )"
          if [ -n "$draft_id" ]; then
            echo "Reusing draft release ${draft_id} for ${RELEASE_TAG}."
            jq -n \
              --arg tag "$RELEASE_TAG" \
              --arg sha "$TARGET_SHA" \
              '{tag_name: $tag, target_commitish: $sha, name: $tag, draft: true, prerelease: true}' \
            | gh api --method PATCH \
                "repos/${REPOSITORY}/releases/${draft_id}" \
                --input - >/dev/null

            gh api --paginate \
              "repos/${REPOSITORY}/releases/${draft_id}/assets?per_page=100" \
              --jq '.[].id' \
            | while read -r asset_id; do
                echo "Deleting stale draft asset ${asset_id}."
                gh api --method DELETE \
                  "repos/${REPOSITORY}/releases/assets/${asset_id}"
              done
          else
            draft_id="$(
              jq -n \
                --arg tag "$RELEASE_TAG" \
                --arg sha "$TARGET_SHA" \
                '{
                  tag_name: $tag,
                  target_commitish: $sha,
                  name: $tag,
                  draft: true,
                  prerelease: true,
                  body: "Release created by the protected Create release workflow."
                }' \
              | gh api --method POST \
                  "repos/${REPOSITORY}/releases" \
                  --input - \
                  --jq '.id'
            )"
          fi

          mapfile -t asset_files < <(
            find ./assets -maxdepth 1 -type f ! -name 'SHA256SUMS.txt' | sort
          )
          asset_files+=("./assets/SHA256SUMS.txt")
          for asset in "${asset_files[@]}"; do
            name="$(basename "$asset")"
            encoded_name="$(jq -rn --arg name "$name" '$name | @uri')"
            echo "Uploading ${name}."
            curl --fail --silent --show-error \
              --request POST \
              --header "Authorization: Bearer ${GH_TOKEN}" \
              --header "Content-Type: application/octet-stream" \
              --data-binary "@${asset}" \
              --output /dev/null \
              "https://uploads.github.com/repos/${REPOSITORY}/releases/${draft_id}/assets?name=${encoded_name}"
          done

          html_url="$(
            gh api --method PATCH "repos/${REPOSITORY}/releases/${draft_id}" \
              --field draft=false \
              --jq '.html_url'
          )"
          echo "Published ${html_url}; tag ${RELEASE_TAG} now points to ${TARGET_SHA}."
