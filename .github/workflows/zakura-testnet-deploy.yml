name: Deploy Zakura testnet fleet

# Manual fleet deploy for the Zakura testnet nodes.
#
# Runs on a self-hosted Linux x86_64 runner, expected to be installed on
# zakura-testnet-1 with the `zakura-testnet-deployer` label. The deployer builds
# a native zakurad binary on that runner, then uses deploy/deployer/deploy.py to
# scp/install it across the fleet. The zcashd-compat Zakura process is deployed
# as a process-managed node because it shares a host with the sidecar zcashd.

on:
  workflow_dispatch:
    inputs:
      ref:
        description: "Git branch, tag, or SHA to build and deploy"
        required: true
        type: string
        default: main
      force_rebuild:
        description: "Rebuild even if a cached binary for this commit exists"
        type: boolean
        required: false
        default: false
      no_restart:
        description: "Stage binary/config/unit without restarting zakurad"
        type: boolean
        required: false
        default: false
      node:
        description: "Optional single deployer node name; blank deploys the whole fleet"
        required: false
        type: string
        default: ""

permissions:
  contents: read

concurrency:
  group: zakura-testnet-deploy
  cancel-in-progress: false

jobs:
  deploy:
    name: "Deploy Zakura testnet ${{ inputs.ref }}"
    runs-on: [self-hosted, "${{ vars.ZAKURA_TESTNET_RUNNER_LABEL || 'zakura-testnet-deployer' }}"]
    timeout-minutes: 180
    environment: zakura-testnet

    steps:
      - name: Checkout deploy ref
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v4
        with:
          persist-credentials: false
          ref: ${{ inputs.ref }}

      - name: Set up Rust toolchain
        uses: actions-rust-lang/setup-rust-toolchain@46268bd060767258de96ed93c1251119784f2ab6 # v1.16.1
        with:
          toolchain: stable
          cache: false

      - name: Restore Rust cache
        uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1
        with:
          cache-on-failure: true

      - name: Install build dependencies
        run: |
          set -euo pipefail
          sudo apt-get -qq update
          sudo apt-get -qq install -y --no-install-recommends \
            build-essential \
            clang \
            cmake \
            git \
            libclang-dev \
            pkg-config \
            protobuf-compiler \
            python3

      - name: Start SSH agent when deploy key is configured
        env:
          ZAKURA_TESTNET_DEPLOY_SSH_KEY: ${{ secrets.ZAKURA_TESTNET_DEPLOY_SSH_KEY }}
        run: |
          set -euo pipefail

          if [ -z "${ZAKURA_TESTNET_DEPLOY_SSH_KEY}" ]; then
            echo "ZAKURA_TESTNET_DEPLOY_SSH_KEY is not set; using the runner's existing SSH identity."
            exit 0
          fi

          ssh_agent_sock="$RUNNER_TEMP/ssh-agent.sock"
          ssh-agent -a "$ssh_agent_sock" > "$RUNNER_TEMP/ssh-agent.env"
          SSH_AUTH_SOCK="$ssh_agent_sock" ssh-add - <<< "$ZAKURA_TESTNET_DEPLOY_SSH_KEY"
          echo "SSH_AUTH_SOCK=$ssh_agent_sock" >> "$GITHUB_ENV"

      - name: Pin fleet host keys
        run: |
          set -euo pipefail

          mkdir -p ~/.ssh
          chmod 700 ~/.ssh
          : > ~/.ssh/known_hosts
          for host in \
            167.99.103.111 \
            167.99.110.145 \
            138.68.229.254 \
            164.92.209.78 \
            206.189.148.0 \
            206.189.208.228; do
            ssh-keyscan -T 30 -H "$host" >> ~/.ssh/known_hosts
          done
          chmod 600 ~/.ssh/known_hosts

      - name: Generate deployer fleet config
        working-directory: deploy/deployer
        run: |
          set -euo pipefail

          cat > nodes.ci.toml <<EOF
          [defaults]
          service_name    = "zakurad"
          bin_path        = "/usr/local/bin/zakurad"
          config_path     = "/etc/zakura/zakura.toml"
          network         = "Testnet"
          listen_addr     = "0.0.0.0:18233"
          rpc_listen_addr = "0.0.0.0:18232"
          rpc_enable_cookie_auth = false
          storage_mode    = "archive"
          p2p_stack       = "dual"
          metrics_endpoint = "127.0.0.1:9999"
          tracing_filter  = "info,zakura_network::zakura=info"
          checkpoint_sync = false
          vct_fast_sync   = false

          [defaults.zakura]
          listen_addr = "0.0.0.0:8234"
          bootstrap_peers = [
              "57ad39fad4f0bca46cf1ea831772a99d5027b372fef2be5a0ea68e1b5bb4da49@167.99.103.111:8234",
              "4faac8f988a7820690d63b57a385cd6f833638b068e774550712c05e4b692426@167.99.110.145:8234",
              "9ce6b95aa197d169399788fe01dd8a88140e81d23d00b4739aeeb1113c6247a2@138.68.229.254:8234",
              "2bbb907b5d90598ef49f2e637066586b311a64587479be6ed43e8388587fcd2a@164.92.209.78:8234",
              "50999835f48f4a048c0e9042e5332844c9673943d7fab1f7e993bae698c27ea3@206.189.148.0:8234",
          ]

          [[nodes]]
          name       = "zakura-testnet-1"
          ssh_string = "root@167.99.103.111"
          commit     = "${{ inputs.ref }}"
          network_cache_dir = "/mnt/zakura-testnet-1-data/zakura-cache"
          state_cache_dir = "/mnt/zakura-testnet-1-data/zakura-cache"
          log_file = "/mnt/zakura-testnet-1-data/logs/zakura.log"

          [[nodes]]
          name       = "zakura-testnet-2"
          ssh_string = "root@167.99.110.145"
          commit     = "${{ inputs.ref }}"
          network_cache_dir = "/mnt/zakura-testnet-2-data/zakura-cache"
          state_cache_dir = "/mnt/zakura-testnet-2-data/zakura-cache"
          log_file = "/mnt/zakura-testnet-2-data/logs/zakura.log"

          [[nodes]]
          name       = "zakura-testnet-3"
          ssh_string = "root@138.68.229.254"
          commit     = "${{ inputs.ref }}"
          network_cache_dir = "/mnt/zakura-testnet-3-data/zakura-cache"
          state_cache_dir = "/mnt/zakura-testnet-3-data/zakura-cache"
          log_file = "/mnt/zakura-testnet-3-data/logs/zakura.log"

          [[nodes]]
          name       = "zakura-testnet-eu"
          ssh_string = "root@164.92.209.78"
          commit     = "${{ inputs.ref }}"
          network_cache_dir = "/mnt/zakura-testnet-eu-data/zakura-cache"
          state_cache_dir = "/mnt/zakura-testnet-eu-data/zakura-cache"
          log_file = "/mnt/zakura-testnet-eu-data/logs/zakura.log"

          [[nodes]]
          name       = "zakura-testnet-as"
          ssh_string = "root@206.189.148.0"
          commit     = "${{ inputs.ref }}"
          network_cache_dir = "/mnt/zakura-testnet-as-data/zakura-cache"
          state_cache_dir = "/mnt/zakura-testnet-as-data/zakura-cache"
          log_file = "/mnt/zakura-testnet-as-data/logs/zakura.log"

          [[nodes]]
          name       = "zakura-compat"
          ssh_string = "root@206.189.208.228"
          commit     = "${{ inputs.ref }}"
          deploy_kind = "process"
          service_name = ""
          bin_path = "/root/unity/zakura/target/release/zakurad"
          config_path = "/root/unity/zakura-testnet.toml"
          network_cache_dir = "/mnt/zakura-testnet-1-data/zakura-cache"
          state_cache_dir = "/mnt/zakura-testnet-1-data/zakura-cache"
          log_file = "/mnt/zakura-testnet-1-data/logs/zakura.log"
          working_dir = "/root/unity/zakura"
          start_command = "target/release/zakurad -c /root/unity/zakura-testnet.toml start"
          process_pattern = "target/release/zakurad -c /root/unity/zakura-testnet.toml start"
          p2p_stack = "legacy"
          checkpoint_sync = true
          EOF

      - name: Build deployer binary
        working-directory: deploy/deployer
        run: |
          set -euo pipefail

          args=(--config nodes.ci.toml)
          if [ "${{ inputs.force_rebuild }}" = "true" ]; then
            args+=(--force)
          fi
          if [ -n "${{ inputs.node }}" ]; then
            args+=(--node "${{ inputs.node }}")
          fi

          python3 deploy.py build "${args[@]}"

      - name: Deploy fleet
        working-directory: deploy/deployer
        run: |
          set -euo pipefail

          args=(--config nodes.ci.toml)
          if [ "${{ inputs.force_rebuild }}" = "true" ]; then
            args+=(--force)
          fi
          if [ "${{ inputs.no_restart }}" = "true" ]; then
            args+=(--no-restart)
          fi
          if [ -n "${{ inputs.node }}" ]; then
            args+=(--node "${{ inputs.node }}")
          fi

          python3 deploy.py deploy "${args[@]}"

      - name: Verify zcashd-compat sidecar sync
        if: ${{ !inputs.no_restart && (inputs.node == '' || inputs.node == 'zakura-compat') }}
        run: |
          set -euo pipefail

          scp deploy/zcashd-compat/sync-check.sh root@206.189.208.228:/tmp/zcashd-compat-sync-check.sh
          ssh root@206.189.208.228 'chmod 755 /tmp/zcashd-compat-sync-check.sh'
          ssh root@206.189.208.228 '
            ZAKURA_RPC_URL=http://127.0.0.1:18232
            ZAKURA_COOKIE_FILE=
            ZCASHD_RPC_URL=http://127.0.0.1:18231
            ZCASHD_COOKIE_FILE=
            ZCASHD_RPC_CONF=/root/unity/zcashd-testnet.toml
            ZAKURAD_PROCESS_PATTERN="target/release/zakurad -c /root/unity/zakura-testnet.toml start"
            ZCASHD_PROCESS_PATTERN="zcashd .*zcashd-testnet.toml"
            HEIGHT_MAX_DRIFT=10
            SYNC_CHECK_TIMEOUT=600
            SYNC_CHECK_INTERVAL=15
            export ZAKURA_RPC_URL ZAKURA_COOKIE_FILE ZCASHD_RPC_URL ZCASHD_COOKIE_FILE ZCASHD_RPC_CONF
            export ZAKURAD_PROCESS_PATTERN ZCASHD_PROCESS_PATTERN HEIGHT_MAX_DRIFT SYNC_CHECK_TIMEOUT SYNC_CHECK_INTERVAL
            /tmp/zcashd-compat-sync-check.sh
          '

      - name: Show fleet status
        if: always()
        working-directory: deploy/deployer
        run: |
          set -euo pipefail

          args=(--config nodes.ci.toml)
          if [ -n "${{ inputs.node }}" ]; then
            args+=(--node "${{ inputs.node }}")
          fi

          python3 deploy.py status "${args[@]}"

      - name: Install cluster status dashboard
        if: always()
        run: |
          set -euo pipefail

          dashboard_dir="/opt/zakura-testnet-dashboard"
          sudo install -d -m 755 "$dashboard_dir"
          sudo install -m 755 deploy/runner/zakura-cluster-status.py "$dashboard_dir/zakura-cluster-status.py"
          cp deploy/deployer/nodes.ci.toml "$RUNNER_TEMP/dashboard.nodes.toml"
          cat >> "$RUNNER_TEMP/dashboard.nodes.toml" <<'EOF'

          [[nodes]]
          name       = "zcashd-compat"
          ssh_string = "root@206.189.208.228"
          probe_kind = "zcashd"
          service_name = ""
          bin_path = "/root/unity/zcash/src/zcashd"
          log_file = ""
          rpc_listen_addr = "127.0.0.1:18231"
          rpc_auth = "zcash_conf"
          rpc_config_path = "/root/unity/zcashd-testnet.toml"
          process_pattern = "zcashd.*zcashd-testnet.toml"
          EOF
          sudo install -m 644 "$RUNNER_TEMP/dashboard.nodes.toml" "$dashboard_dir/nodes.toml"

          sudo tee /etc/systemd/system/zakura-testnet-dashboard.service >/dev/null <<'EOF'
          [Unit]
          Description=Zakura testnet cluster status dashboard
          After=network-online.target
          Wants=network-online.target

          [Service]
          Type=simple
          WorkingDirectory=/opt/zakura-testnet-dashboard
          ExecStart=/usr/bin/python3 /opt/zakura-testnet-dashboard/zakura-cluster-status.py --config /opt/zakura-testnet-dashboard/nodes.toml --host 0.0.0.0 --port 8090 --interval 10 --stale-after 300 --upgrade-height 4134000 --target-spacing 7.5
          Restart=always
          RestartSec=5

          [Install]
          WantedBy=multi-user.target
          EOF

          sudo systemctl daemon-reload
          sudo systemctl enable zakura-testnet-dashboard.service
          sudo systemctl restart zakura-testnet-dashboard.service
          sudo systemctl --no-pager --full status zakura-testnet-dashboard.service || true

      - name: Install snapshots website
        if: always()
        run: |
          set -euo pipefail

          site_dir="/opt/zakura-testnet-snapshots/site"
          sudo install -d -m 755 "$site_dir"
          sudo install -d -m 755 "$site_dir/files"
          sudo install -m 644 deploy/deployer/testnet/snapshots-site/index.html "$site_dir/index.html"

          if ! sudo test -f "$site_dir/snapshots.json"; then
            sudo install -m 644 deploy/deployer/testnet/snapshots-site/snapshots.json "$site_dir/snapshots.json"
          fi

          sudo tee /etc/systemd/system/zakura-testnet-snapshots.service >/dev/null <<'EOF'
          [Unit]
          Description=Zakura testnet snapshots website
          After=network-online.target
          Wants=network-online.target

          [Service]
          Type=simple
          WorkingDirectory=/opt/zakura-testnet-snapshots/site
          ExecStart=/usr/bin/python3 -m http.server 8091 --bind 0.0.0.0 --directory /opt/zakura-testnet-snapshots/site
          Restart=always
          RestartSec=5

          [Install]
          WantedBy=multi-user.target
          EOF

          sudo systemctl daemon-reload
          sudo systemctl enable zakura-testnet-snapshots.service
          sudo systemctl restart zakura-testnet-snapshots.service
          sudo systemctl --no-pager --full status zakura-testnet-snapshots.service || true

      - name: Fetch recent logs on failure
        if: failure()
        working-directory: deploy/deployer
        run: |
          set -euo pipefail

          args=(--config nodes.ci.toml --lines 300)
          if [ -n "${{ inputs.node }}" ]; then
            args+=(--node "${{ inputs.node }}")
          fi

          python3 deploy.py logs fetch "${args[@]}" || true

      - name: Upload failure logs
        if: failure()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v4
        with:
          name: zakura-testnet-deploy-logs-${{ github.run_id }}
          path: deploy/deployer/logs/
          if-no-files-found: ignore
          retention-days: 14
