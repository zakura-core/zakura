name: Test Docker Config

on:
  pull_request:
    branches: [main, "feat/**", "release/**"]
    types: [opened, synchronize, reopened]
    paths:
      - "zakurad/src/**"
      - "zakura-network/src/config.rs"
      - "zakura-network/src/config/**"
      - "zakura-rpc/src/config.rs"
      - "zakura-rpc/src/config/**"
      - "zakura-state/src/config.rs"
      - "**/build.rs"
      - "**/Cargo.toml"
      - "**/Cargo.lock"
      - .dockerignore
      - docker/Dockerfile
      - docker/entrypoint.sh
      - docker/**/*.toml
      - zakurad/tests/common/configs/**
      - .github/workflows/release-binaries.yml
      - .github/workflows/test-docker.yml

  schedule:
    # Catch Docker and runner-image drift without rebuilding on every Rust merge.
    - cron: "0 9 * * 1"

  workflow_dispatch:

  push:
    branches: [main, "feat/**", "release/**"]
    paths:
      - "zakurad/src/**"
      - "zakura-network/src/config.rs"
      - "zakura-network/src/config/**"
      - "zakura-rpc/src/config.rs"
      - "zakura-rpc/src/config/**"
      - "zakura-state/src/config.rs"
      - "**/build.rs"
      - "**/Cargo.toml"
      - "**/Cargo.lock"
      - .dockerignore
      - docker/Dockerfile
      - docker/entrypoint.sh
      - docker/**/*.toml
      - zakurad/tests/common/configs/**
      - .github/workflows/release-binaries.yml
      - .github/workflows/test-docker.yml

# Ensures that only one workflow task will run at a time. Previous builds, if
# already in process, will get cancelled. Only the latest commit will be allowed
# to run, cancelling any workflows in between
concurrency:
  group: ${{ github.workflow }}-${{ github.head_ref || github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  pull-requests: read

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1
  RUST_LIB_BACKTRACE: 1
  RUST_LOG: info
  COLORBT_SHOW_HIDDEN: 1

jobs:
  test-docker-image:
    name: Test Runtime Docker Image
    runs-on: ${{ vars.DOCKER_BUILD_RUNNER_AMD64 || 'ubuntu-latest' }}
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 #v7.0.1
        with:
          persist-credentials: false
      - name: Resolve image metadata
        id: image
        run: echo "short_sha=$(git rev-parse --short=7 HEAD)" >> "$GITHUB_OUTPUT"
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@bb05f3f5519dd87d3ba754cc423b652a5edd6d2c #v4.2.0
      - name: Build runtime image
        uses: docker/build-push-action@53b7df96c91f9c12dcc8a07bcb9ccacbed38856a #v7.3.0
        with:
          target: runtime
          context: .
          file: docker/Dockerfile
          load: true
          tags: zakurad-runtime-test:${{ github.sha }}
          build-args: |
            FEATURES=${{ vars.RUST_PROD_FEATURES || 'default-release-binaries' }}
            SHORT_SHA=${{ steps.image.outputs.short_sha }}

      - name: Test image contract
        env:
          IMAGE: zakurad-runtime-test:${{ github.sha }}
        run: |
          set -euo pipefail

          id_output=$(docker run --rm "$IMAGE" id)
          echo "$id_output"
          grep -Eq 'uid=10001\(zebra\).*gid=10001\(zebra\)' <<< "$id_output"

          docker run --rm "$IMAGE" zakurad --version
          docker run --rm "$IMAGE" zakura-rollback-state --help >/dev/null
          docker run --rm "$IMAGE" zakura-prune-state --help >/dev/null

      - name: Test default startup
        env:
          IMAGE: zakurad-runtime-test:${{ github.sha }}
        run: |
          set -euo pipefail

          container=zakura-default-config
          cleanup() {
            status=$?
            trap - EXIT
            if (( status != 0 )); then
              docker logs "$container" 2>&1 || true
            fi
            docker rm --force "$container" >/dev/null 2>&1 || true
            exit "$status"
          }
          trap cleanup EXIT

          docker run --detach --name "$container" "$IMAGE" zakurad start

          for _ in {1..60}; do
            logs=$(docker logs "$container" 2>&1)
            if grep -Fq "No config file provided, using default configuration" <<< "$logs" &&
              grep -Fq "Zcash network: Mainnet" <<< "$logs" &&
              grep -Fq "Opened Zakura state cache at /home/zebra/.cache/zakura" <<< "$logs"; then
              exit 0
            fi

            if [[ $(docker inspect --format '{{.State.Running}}' "$container") != true ]]; then
              echo "default-config container exited before startup completed" >&2
              exit 1
            fi
            sleep 1
          done

          echo "default-config container did not start within 60 seconds" >&2
          exit 1

      - name: Test combined configuration overrides
        env:
          IMAGE: zakurad-runtime-test:${{ github.sha }}
        run: |
          set -euo pipefail

          container=zakura-config-overrides
          cleanup() {
            status=$?
            trap - EXIT
            if (( status != 0 )); then
              docker logs "$container" 2>&1 || true
            fi
            docker rm --force "$container" >/dev/null 2>&1 || true
            exit "$status"
          }
          trap cleanup EXIT

          docker run \
            --detach \
            --name "$container" \
            --volume "$GITHUB_WORKSPACE/zakurad/tests/common/configs/custom-conf.toml:/tmp/custom-conf.toml:ro" \
            --env CONFIG_FILE_PATH=/tmp/custom-conf.toml \
            --env ZAKURA_NETWORK__NETWORK=Testnet \
            --env ZAKURA_RPC__LISTEN_ADDR=127.0.0.1:28232 \
            --env ZAKURA_RPC__ENABLE_COOKIE_AUTH=true \
            --env ZAKURA_RPC__COOKIE_DIR=/tmp/zakura-cookie \
            --env ZAKURA_STATE__CACHE_DIR=/tmp/zakura-cache \
            --env ZAKURA_METRICS__ENDPOINT_ADDR=0.0.0.0:9999 \
            "$IMAGE" \
            zakurad start

          ready=false
          for _ in {1..60}; do
            logs=$(docker logs "$container" 2>&1)
            if grep -Fq "INFO: Using config file at /tmp/custom-conf.toml" <<< "$logs" &&
              grep -Fq "Zcash network: Testnet" <<< "$logs" &&
              grep -Fq 'extra_coinbase_data: Some(ExtraCoinbaseData("Do you even shield?"))' <<< "$logs" &&
              grep -Fq "Opened Zakura state cache at /tmp/zakura-cache" <<< "$logs" &&
              grep -Fq "Trying to open metrics endpoint at 0.0.0.0:9999" <<< "$logs" &&
              grep -Fq "RPC auth cookie written to disk" <<< "$logs" &&
              grep -Fq "Opened RPC endpoint at 127.0.0.1:28232" <<< "$logs"; then
              ready=true
              break
            fi

            if [[ $(docker inspect --format '{{.State.Running}}' "$container") != true ]]; then
              echo "config-overrides container exited before startup completed" >&2
              exit 1
            fi
            sleep 1
          done

          if [[ "$ready" != true ]]; then
            echo "config-overrides container did not start within 60 seconds" >&2
            exit 1
          fi

          test "$(docker exec "$container" stat --format '%u:%g' /tmp/zakura-cache)" = "10001:10001"
          test "$(docker exec "$container" stat --format '%u:%g' /tmp/zakura-cookie)" = "10001:10001"
          docker exec "$container" test -f /tmp/zakura-cookie/.cookie

  test-docker-config-success:
    name: Test Docker Config Success
    runs-on: ubuntu-latest
    if: always()
    needs:
      - test-docker-image
    timeout-minutes: 30
    steps:
      - name: Decide whether the needed jobs succeeded or failed
        uses: re-actors/alls-green@05ac9388f0aebcb5727afa17fcccfecd6f8ec5fe #v1.2.2
        with:
          jobs: ${{ toJSON(needs) }}
          allowed-skips: test-docker-image
