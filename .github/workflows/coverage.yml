name: Coverage

on:
  # Coverage is a 120-minute instrumented full build. Keep it off the per-push
  # critical path: run it only on landings to the long-lived branches, once a
  # night, and on demand. Pushes to short-lived dev branches no longer trigger
  # it (it is not a merge gate).
  push:
    branches: [main, "release/**"]
    paths:
      - "**/*.rs"
      - "**/Cargo.toml"
      - "**/Cargo.lock"
      - .config/nextest.toml
      - codecov.yml
      - .github/workflows/coverage.yml

  schedule:
    - cron: "0 8 * * *"

  workflow_dispatch:

# Ensures that only one workflow task will run at a time. Previous builds, if
# already in process, will get cancelled. Only the latest commit will be allowed
# to run, cancelling any workflows in between
concurrency:
  group: ${{ github.workflow }}-${{ github.head_ref || github.run_id }}
  cancel-in-progress: true

permissions:
  contents: read
  pull-requests: read

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1
  RUST_LIB_BACKTRACE: 1
  RUST_LOG: info
  COLORBT_SHOW_HIDDEN: 1

jobs:
  coverage:
    # `contents: read` is intentionally omitted: this job uploads source to a
    # public Codecov project, so missing checkout permission keeps it inert
    # on private forks as a fail-closed safeguard.
    permissions:
      id-token: write
      statuses: write
    runs-on: ubuntu-latest
    timeout-minutes: 120

    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 #v7.0.0
        with:
          persist-credentials: false
      - uses: actions-rust-lang/setup-rust-toolchain@166cdcfd11aee3cb47222f9ddb555ce30ddb9659 #v1.17.0
        with:
          toolchain: stable
          components: llvm-tools-preview
          cache-on-failure: true
      - uses: taiki-e/install-action@5ebac0d9522d786674368e47e92963ba13f2c376 #v2.82.11
        with:
          tool: cargo-llvm-cov,nextest
      - uses: ./.github/actions/setup-zebra-build
      - name: Run coverage tests
        run: |
          cargo llvm-cov --no-report nextest
          # TODO: Do we need --locked --release --features "default-release-binaries" here?
          cargo llvm-cov report --lcov --output-path lcov.info
        env:
          TEST_LARGE_CHECKPOINTS: 1
          # We set cases to 1, because some tests already run 1 case by default.
          # We set maximum shrink iterations to 0, because we don't expect failures in coverage tests.
          # Coverage tests are much slower than other tests, particularly in hot loops.
          PROPTEST_CASES: 1
          PROPTEST_MAX_SHRINK_ITERS: 0

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@fb8b3582c8e4def4969c97caa2f19720cb33a72f #v7.0.0
        with:
          files: lcov.info

  coverage-success:
    name: coverage success
    runs-on: ubuntu-latest
    if: always()
    needs:
      - coverage
    steps:
      - name: Decide whether the needed jobs succeeded or failed
        uses: re-actors/alls-green@05ac9388f0aebcb5727afa17fcccfecd6f8ec5fe #v1.2.2
        with:
          jobs: ${{ toJSON(needs) }}
