name: Test Crate Build

on:
  pull_request:
    branches: [main, "feat/**", "release/**"]
    paths:
      - "**/*.rs"
      - "**/Cargo.toml"
      - "**/Cargo.lock"
      - .cargo/config.toml
      - "**/clippy.toml"
      - .github/workflows/test-crates.yml

  push:
    branches: [main, "feat/**", "release/**"]
    paths:
      - "**/*.rs"
      - "**/Cargo.toml"
      - "**/Cargo.lock"
      - .cargo/config.toml
      - "**/clippy.toml"
      - .github/workflows/test-crates.yml

  # Run the full crate-build suite when a PR is queued so the merge queue
  # validates the merged result against the latest `main`. `merge_group` ignores
  # path filters, so this runs unconditionally on every queued entry.
  merge_group:

  workflow_dispatch:

# Ensures that only one workflow task will run at a time. Previous builds, if
# already in process, will get cancelled. Only the latest commit will be allowed
# to run, cancelling any workflows in between
concurrency:
  group: ${{ github.workflow }}-${{ github.head_ref || github.run_id }}
  cancel-in-progress: true

permissions:
  contents: read
  pull-requests: read

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1
  RUST_LIB_BACKTRACE: 1
  RUST_LOG: info
  COLORBT_SHOW_HIDDEN: 1

jobs:
  # Verify every crate builds, both with its default features and with no
  # default features.
  #
  # This replaces the previous per-crate build matrix (each crate built 4 ways
  # with clippy + build, throttled to 4 parallel cold jobs) and the lint
  # `crate-checks` / `features` jobs with one `cargo hack` pass in a single warm
  # target dir. cargo-hack iterates every workspace crate, so this preserves the
  # matrix's unique guarantee — that each crate compiles with `--no-default-
  # features` — which the lint clippy (`default-release-binaries`) and
  # `check-cargo-lock` (`--all-features`) jobs do not cover. The all-targets /
  # all-features dimension stays covered by those lint jobs.
  #
  # NOTE: we intentionally do NOT use `--each-feature` here. It checks every
  # feature in isolation, which is stricter than anything this project gated on
  # before and surfaces pre-existing non-additive-feature issues (e.g.
  # zakura-chain's `async-error` not pulling in tokio's `rt` feature). Enforcing
  # that is a separate, deliberate effort, not part of this CI change.
  crate-checks:
    name: Build crates (default and no-default features)
    permissions:
      contents: read
      id-token: write
      statuses: write
    runs-on: ubuntu-latest
    timeout-minutes: 90
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd #v6.0.2
        with:
          persist-credentials: false

      - uses: actions-rust-lang/setup-rust-toolchain@46268bd060767258de96ed93c1251119784f2ab6 #v1.16.1
        with:
          toolchain: stable
          cache-key: crate-checks
          cache-on-failure: true

      - uses: taiki-e/install-action@65851e10cd6c377f11a60e600abc07cb08643468 #v2.79.3
        with:
          tool: cargo-hack

      - uses: ./.github/actions/setup-zakura-build

      - name: Check every crate with default and no-default features
        run: |
          cargo hack check --workspace
          cargo hack check --workspace --no-default-features
        env:
          # Treat warnings as errors, preserving the old `features` job behavior.
          RUSTFLAGS: -D warnings

  test-crate-build-success:
    name: test crate build success
    runs-on: ubuntu-latest
    if: always()
    needs:
      - crate-checks
    timeout-minutes: 30
    steps:
      - name: Decide whether the needed jobs succeeded or failed
        uses: re-actors/alls-green@05ac9388f0aebcb5727afa17fcccfecd6f8ec5fe #v1.2.2
        with:
          jobs: ${{ toJSON(needs) }}
