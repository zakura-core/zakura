# Zebra cargo configuration

[alias]
xtask = "run --package xtask --"

[build]
rustdocflags = [
    # Keep shared rustdoc lint levels synchronized with the book and lint
    # workflows.

    # Links in public docs can point to private items.
    "-Arustdoc::private_intra_doc_links",
]

[env]
RUST_BACKTRACE="1"

[profile.profiling]
inherits = "release"
debug = true
