name: Deploy Zakura mainnet fleet

# Manual fleet deploy for the Zakura mainnet nodes.
#
# Runs on a self-hosted Linux x86_64 runner, expected to be installed on
# us-east-0 (159.65.183.89) with the `zakura-mainnet-deployer` label (see
# deploy/deployer/mainnet/bootstrap-zakura-mainnet-runner.sh). The deployer
# builds a native zakurad binary on that runner, then uses deploy/deployer/
# deploy.py to scp/install it across the fleet.
#
# BINARY-ONLY DEPLOY. The mainnet nodes were provisioned by hand with rich,
# per-node configs (external_addr, an inline zakura_node_secret_key that pins
# each node's iroh identity, custom peers, and mempool/sync tuning) and their
# state DB at /root/.cache/zebra. To avoid changing node identities or resyncing,
# this deploy sets manage_config = false: it only swaps /usr/local/bin/zebrad and
# restarts the existing `zebrad` service, leaving the config, unit, and cache
# untouched. Rebuilding those configs into the deployer's managed model is
# separate future work.
#
# After PR #21, hand configs should use network.p2p_stack (zebra|zakura|dual|
# default) rather than the deprecated v2_p2p/legacy_p2p bools. This workflow does
# not rewrite node configs; p2p_stack below is dashboard/metadata only.

on:
  workflow_dispatch:
    inputs:
      ref:
        description: "Git branch, tag, or SHA to build and deploy"
        required: true
        type: string
        default: main
      force_rebuild:
        description: "Rebuild even if a cached binary for this commit exists"
        type: boolean
        required: false
        default: false
      no_restart:
        description: "Stage the binary without restarting the node"
        type: boolean
        required: false
        default: false
      node:
        description: "Optional single deployer node name; blank deploys the whole fleet"
        required: false
        type: string
        default: ""

permissions:
  contents: read

concurrency:
  group: zakura-mainnet-deploy
  cancel-in-progress: false

jobs:
  deploy:
    name: "Deploy Zakura mainnet ${{ inputs.ref }}"
    runs-on: [self-hosted, "${{ vars.ZAKURA_MAINNET_RUNNER_LABEL || 'zakura-mainnet-deployer' }}"]
    timeout-minutes: 180
    environment: zakura-mainnet

    # Persist Cargo build artifacts across runs, outside the checked-out workspace
    # (which actions/checkout wipes). deploy.py builds each commit in a throwaway
    # git worktree and honors CARGO_TARGET_DIR, so an unchanged commit relinks in
    # seconds instead of a ~18-minute cold rebuild — essential for one-node-at-a-
    # time fleet rollouts that all build the same tag.
    env:
      CARGO_TARGET_DIR: /root/.cache/zakura-deployer-target

    steps:
      - name: Checkout deploy ref
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v4
        with:
          persist-credentials: false
          ref: ${{ inputs.ref }}

      - name: Verify deployer supports binary-only mode
        # The checked-out deploy.py comes from `inputs.ref`; this fleet's config
        # sets `manage_config = false`. If the checked-out deploy.py predates that
        # support it would silently run a destructive config-managed deploy, so
        # fail fast instead. deploy.py also now rejects unknown config keys.
        run: |
          set -euo pipefail
          if ! grep -q 'manage_config' deploy/deployer/deploy.py; then
            echo "::error::deploy.py at ref '${{ inputs.ref }}' lacks manage_config support." \
                 "Deploy from a ref whose deploy.py supports binary-only mode."
            exit 1
          fi

      - name: Set up Rust toolchain
        uses: actions-rust-lang/setup-rust-toolchain@46268bd060767258de96ed93c1251119784f2ab6 # v1.16.1
        with:
          toolchain: stable
          cache-on-failure: true

      - name: Restore Rust cache
        uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1
        with:
          cache-on-failure: true

      - name: Install build dependencies
        run: |
          set -euo pipefail
          sudo apt-get -qq update
          sudo apt-get -qq install -y --no-install-recommends \
            build-essential \
            clang \
            cmake \
            git \
            libclang-dev \
            pkg-config \
            protobuf-compiler \
            python3

      - name: Start SSH agent when deploy key is configured
        env:
          ZAKURA_MAINNET_DEPLOY_SSH_KEY: ${{ secrets.ZAKURA_MAINNET_DEPLOY_SSH_KEY }}
        run: |
          set -euo pipefail

          if [ -z "${ZAKURA_MAINNET_DEPLOY_SSH_KEY}" ]; then
            echo "ZAKURA_MAINNET_DEPLOY_SSH_KEY is not set; using the runner's existing SSH identity."
            exit 0
          fi

          ssh_agent_sock="$RUNNER_TEMP/ssh-agent.sock"
          ssh-agent -a "$ssh_agent_sock" > "$RUNNER_TEMP/ssh-agent.env"
          SSH_AUTH_SOCK="$ssh_agent_sock" ssh-add - <<< "$ZAKURA_MAINNET_DEPLOY_SSH_KEY"
          echo "SSH_AUTH_SOCK=$ssh_agent_sock" >> "$GITHUB_ENV"

      - name: Pin fleet host keys
        run: |
          set -euo pipefail

          mkdir -p ~/.ssh
          chmod 700 ~/.ssh
          : > ~/.ssh/known_hosts
          for host in \
            165.22.54.66 \
            104.131.184.123 \
            159.65.183.89 \
            143.244.184.176 \
            159.203.38.10 \
            64.227.44.93 \
            161.35.156.226 \
            139.59.64.115 \
            168.144.173.250 \
            159.203.113.196; do
            ssh-keyscan -T 30 -H "$host" >> ~/.ssh/known_hosts
          done
          chmod 600 ~/.ssh/known_hosts

      - name: Generate deployer fleet config
        working-directory: deploy/deployer
        run: |
          set -euo pipefail

          cat > nodes.ci.toml <<EOF
          [defaults]
          # Binary-only: swap the binary and restart the existing service; leave
          # the hand-tuned config, unit, and /root/.cache/zebra state untouched.
          deploy_kind     = "systemd"
          manage_config   = false
          service_name    = "zebrad"
          bin_path        = "/usr/local/bin/zebrad"
          network         = "Mainnet"
          # Dashboard/metadata only (manage_config = false does not render this).
          # Mainnet binary default is zebra; dual/zakura must be set on-node.
          p2p_stack       = "default"
          # Read-only fields below: consumed by the status dashboard's SSH probe,
          # not written to any node (manage_config = false).
          rpc_listen_addr = "0.0.0.0:8232"
          log_file        = "/root/logs/zebrad.log"

          # Public mainnet node ids (zebra-network/src/zakura/handler.rs). Used by
          # the dashboard to label each host; not deployed to the nodes.
          [defaults.zakura]
          bootstrap_peers = [
              "1398f62c6d1a457c51ba6a4b5f3dbd2f69fca93216218dc8997e416bd17d93ca@165.22.54.66:8234",
              "fd1724385aa0c75b64fb78cd602fa1d991fdebf76b13c58ed702eac835e9f618@104.131.184.123:8234",
              "9ec67ad6834bc2ca0d659c240e042d3446c37cabcc092b527d459c87d938b4a4@159.65.183.89:8234",
              "bd3dc5d2a3d44c6bf90e364bf446231dbf9737e38a562ccf9e91ea631ea59b22@143.244.184.176:8234",
              "14ab98fa0c4b07d40119e1dbc9f3c36d20c8f226ae5ba4216218a2034f148e57@159.203.38.10:8234",
              "681d21b18644cd82ec13256a97f92bec1fff815683ef6f65dc7c993f098a4fe5@64.227.44.93:8234",
              "058b3f20dc9bef7bb447f94d7663d793cfbc036720f97e52d7f13661b21818e1@161.35.156.226:8234",
              "291323d78eb7186c3fa225ef5e305e95363e0ef06d42dca91bd4ef0254aed1ae@139.59.64.115:8234",
              "85e425233a68697d4be91dd5d542305a8a327cd06d992d53c0913cef2fa75084@168.144.173.250:8234",
          ]

          [[nodes]]
          name       = "asia-0"
          ssh_string = "root@165.22.54.66"
          commit     = "${{ inputs.ref }}"

          [[nodes]]
          name       = "us-0"
          ssh_string = "root@104.131.184.123"
          commit     = "${{ inputs.ref }}"

          [[nodes]]
          name       = "us-east-0"
          ssh_string = "root@159.65.183.89"
          commit     = "${{ inputs.ref }}"

          [[nodes]]
          name       = "us-west-0"
          ssh_string = "root@143.244.184.176"
          commit     = "${{ inputs.ref }}"

          [[nodes]]
          name       = "canada-0"
          ssh_string = "root@159.203.38.10"
          commit     = "${{ inputs.ref }}"

          [[nodes]]
          name       = "europe-west-0"
          ssh_string = "root@64.227.44.93"
          commit     = "${{ inputs.ref }}"

          [[nodes]]
          name       = "europe-central-0"
          ssh_string = "root@161.35.156.226"
          commit     = "${{ inputs.ref }}"

          [[nodes]]
          name       = "asia-south-0"
          ssh_string = "root@139.59.64.115"
          commit     = "${{ inputs.ref }}"

          [[nodes]]
          name       = "asia-pacific-0"
          ssh_string = "root@168.144.173.250"
          commit     = "${{ inputs.ref }}"

          [[nodes]]
          name       = "zakura-compat"
          ssh_string = "root@159.203.113.196"
          commit     = "${{ inputs.ref }}"
          service_name = "zebrad-compat"
          log_file   = ""
          # Dashboard-only probe of zebrad's local RPC (same pattern as other
          # mainnet nodes). Does not configure zcashd RPC ingest.
          rpc_listen_addr = "127.0.0.1:8232"
          rpc_auth   = "cookie"
          rpc_config_path = "/root/.cache/zebra/.cookie"
          EOF

      - name: Build deployer binary
        working-directory: deploy/deployer
        run: |
          set -euo pipefail

          args=(--config nodes.ci.toml)
          if [ "${{ inputs.force_rebuild }}" = "true" ]; then
            args+=(--force)
          fi
          if [ -n "${{ inputs.node }}" ]; then
            args+=(--node "${{ inputs.node }}")
          fi

          python3 deploy.py build "${args[@]}"

      - name: Suppress fleet watchdog alerts during deploy
        if: ${{ !inputs.no_restart }}
        run: |
          set -euo pipefail

          sudo install -d -m 755 /run/zakura-fleet-watchdog
          printf '%s\n' "$(( $(date +%s) + 1200 ))" \
            | sudo tee /run/zakura-fleet-watchdog/deploy-suppressed-until >/dev/null

      - name: Deploy fleet
        working-directory: deploy/deployer
        run: |
          set -euo pipefail

          args=(--config nodes.ci.toml)
          if [ "${{ inputs.force_rebuild }}" = "true" ]; then
            args+=(--force)
          fi
          if [ "${{ inputs.no_restart }}" = "true" ]; then
            args+=(--no-restart)
          fi
          if [ -n "${{ inputs.node }}" ]; then
            args+=(--node "${{ inputs.node }}")
          fi

          python3 deploy.py deploy "${args[@]}"

      - name: Show fleet status
        if: always()
        working-directory: deploy/deployer
        run: |
          set -euo pipefail

          args=(--config nodes.ci.toml)
          if [ -n "${{ inputs.node }}" ]; then
            args+=(--node "${{ inputs.node }}")
          fi

          python3 deploy.py status "${args[@]}"

      - name: Install cluster status dashboard
        if: always()
        run: |
          set -euo pipefail

          dashboard_dir="/opt/zakura-mainnet-dashboard"
          sudo install -d -m 755 "$dashboard_dir"
          sudo install -m 755 deploy/runner/zebra-cluster-status.py "$dashboard_dir/zebra-cluster-status.py"
          cp deploy/deployer/nodes.ci.toml "$RUNNER_TEMP/dashboard.nodes.toml"
          cat >> "$RUNNER_TEMP/dashboard.nodes.toml" <<'EOF'

          [[nodes]]
          name       = "zcashd-compat"
          ssh_string = "root@159.203.113.196"
          probe_kind = "zcashd"
          service_name = ""
          bin_path = "/mnt/snapshots/import-zebra/zcashd-compat/bin/v6.2.1-alpha.7/x86_64-pc-linux-gnu/zcashd"
          log_file = ""
          rpc_listen_addr = "[::1]:8232"
          rpc_auth = "cookie"
          rpc_config_path = "/mnt/snapshots/runtime/zcashd/.cookie"
          process_pattern = "zcashd .*-zebra-compat"
          EOF
          sudo install -m 644 "$RUNNER_TEMP/dashboard.nodes.toml" "$dashboard_dir/nodes.toml"

          sudo tee /etc/systemd/system/zakura-mainnet-dashboard.service >/dev/null <<'EOF'
          [Unit]
          Description=Zakura mainnet cluster status dashboard
          After=network-online.target
          Wants=network-online.target

          [Service]
          Type=simple
          WorkingDirectory=/opt/zakura-mainnet-dashboard
          ExecStart=/usr/bin/python3 /opt/zakura-mainnet-dashboard/zebra-cluster-status.py --config /opt/zakura-mainnet-dashboard/nodes.toml --host 0.0.0.0 --port 8090 --interval 10 --stale-after 300 --upgrade-height 0
          Restart=always
          RestartSec=5

          [Install]
          WantedBy=multi-user.target
          EOF

          sudo systemctl daemon-reload
          sudo systemctl enable zakura-mainnet-dashboard.service
          sudo systemctl restart zakura-mainnet-dashboard.service
          sudo systemctl --no-pager --full status zakura-mainnet-dashboard.service || true

      - name: Install fleet watchdog
        if: always()
        env:
          SLACK_BOT_TOKEN: ${{ secrets.SLACK_BOT_TOKEN }}
          SLACK_WEB_HOOK: ${{ secrets.SLACK_WEB_HOOK }}
        run: |
          set -euo pipefail

          watchdog_dir="/opt/zakura-fleet-watchdog"
          sudo install -d -m 755 "$watchdog_dir"
          sudo install -d -m 755 /var/lib/zakura-fleet-watchdog
          sudo install -d -m 755 /etc/zakura-fleet-watchdog
          sudo install -m 755 deploy/runner/zebra-cluster-watchdog.py "$watchdog_dir/zebra-cluster-watchdog.py"
          sudo install -m 644 deploy/runner/fleet-watchdog.toml "$watchdog_dir/fleets.toml"
          sudo install -m 644 deploy/runner/zakura-fleet-watchdog.service /etc/systemd/system/zakura-fleet-watchdog.service

          tmp_env="$(mktemp)"
          if [ -n "${SLACK_BOT_TOKEN}" ]; then
            printf 'SLACK_BOT_TOKEN=%s\n' "${SLACK_BOT_TOKEN}" > "$tmp_env"
          elif [ -n "${SLACK_WEB_HOOK}" ]; then
            printf 'SLACK_WEB_HOOK=%s\n' "${SLACK_WEB_HOOK}" > "$tmp_env"
          elif sudo test -f /etc/zakura-fleet-watchdog/env; then
            sudo cp /etc/zakura-fleet-watchdog/env "$tmp_env"
          else
            : > "$tmp_env"
          fi
          sudo install -m 600 "$tmp_env" /etc/zakura-fleet-watchdog/env
          rm -f "$tmp_env"

          sudo systemctl daemon-reload
          sudo systemctl enable zakura-fleet-watchdog.service
          sudo systemctl restart zakura-fleet-watchdog.service
          sudo systemctl --no-pager --full status zakura-fleet-watchdog.service || true

      - name: Fetch recent logs on failure
        if: failure()
        working-directory: deploy/deployer
        run: |
          set -euo pipefail

          args=(--config nodes.ci.toml --lines 300)
          if [ -n "${{ inputs.node }}" ]; then
            args+=(--node "${{ inputs.node }}")
          fi

          python3 deploy.py logs fetch "${args[@]}" || true

      - name: Upload failure logs
        if: failure()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v4
        with:
          name: zakura-mainnet-deploy-logs-${{ github.run_id }}
          path: deploy/deployer/logs/
          if-no-files-found: ignore
          retention-days: 14
