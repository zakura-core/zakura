# Lightweight Zakura dual-stack regtest e2e — a smoke test, deliberately small.
#
# Three zakurad nodes on a fresh Regtest chain. The key cost-saving choice: there
# is NO in-container compilation. Each node runs the HOST-built `zakurad` binary
# bind-mounted into a stock `debian:trixie-slim` (which already ships glibc 2.41,
# libstdc++, and libgcc — everything the binary needs). The previous e2e did a
# full `cargo build --release` per service, which is what exhausted disk/CPU.
#
# Build the binary once on the host, then bring the cluster up:
#
#   cargo build -p zakura --bin zakurad         # debug is fine for regtest
#   ZAKURAD_BIN=$(pwd)/target/debug/zakurad \
#     docker compose -f docker/docker-compose.zakura-regtest-e2e.yml up -d
#
# Or just run docker/zakura-regtest-e2e/run.sh, which does all of the above and
# asserts legacy compatibility, Zakura propagation, and block sync.
#
# Host networking is required: Regtest only accepts localhost initial peers
# (zakura-network/src/config.rs: initial_peers filters to is_localhost), so the
# nodes share 127.0.0.1 on distinct ports. State is ephemeral and traces/temp
# live on tmpfs, so a run leaves nothing on disk. Per-node CPU/memory caps keep
# the whole cluster well under the resources a single build would use.

name: zakura-regtest-e2e

x-zakura-node: &zakura-node
  image: debian:trixie-slim
  network_mode: host
  restart: "no"
  stop_grace_period: 5s
  tmpfs:
    - /tmp
  deploy:
    resources:
      limits:
        cpus: "2"
        memory: 1536m

services:
  zakura-node-1:
    <<: *zakura-node
    container_name: zakura-node-1
    entrypoint: ["/usr/local/bin/zakurad", "--config", "/etc/zakura/node1.toml", "start"]
    volumes:
      - ${ZAKURAD_BIN:-../target/debug/zakurad}:/usr/local/bin/zakurad:ro
      - ${ZAKURA_NODE1_CONFIG:-./zakura-regtest-e2e/node1.toml}:/etc/zakura/node1.toml:ro
      - ${ZAKURA_E2E_TRACE_DIR:-/tmp/zakura-regtest-e2e-traces}:/traces

  zakura-node-2:
    <<: *zakura-node
    container_name: zakura-node-2
    depends_on:
      - zakura-node-1
    entrypoint: ["/usr/local/bin/zakurad", "--config", "/etc/zakura/node2.toml", "start"]
    volumes:
      - ${ZAKURAD_BIN:-../target/debug/zakurad}:/usr/local/bin/zakurad:ro
      - ${ZAKURA_NODE2_CONFIG:-./zakura-regtest-e2e/node2.toml}:/etc/zakura/node2.toml:ro
      - ${ZAKURA_E2E_TRACE_DIR:-/tmp/zakura-regtest-e2e-traces}:/traces

  zakura-node-3:
    <<: *zakura-node
    container_name: zakura-node-3
    depends_on:
      - zakura-node-1
    entrypoint: ["/usr/local/bin/zakurad", "--config", "/etc/zakura/node3.toml", "start"]
    volumes:
      - ${ZAKURAD_BIN:-../target/debug/zakurad}:/usr/local/bin/zakurad:ro
      - ${ZAKURA_NODE3_CONFIG:-./zakura-regtest-e2e/node3.toml}:/etc/zakura/node3.toml:ro
      - ${ZAKURA_E2E_TRACE_DIR:-/tmp/zakura-regtest-e2e-traces}:/traces

  zakura-node-4:
    <<: *zakura-node
    container_name: zakura-node-4
    depends_on:
      - zakura-node-1
    entrypoint: ["/usr/local/bin/zakurad", "--config", "/etc/zakura/node4.toml", "start"]
    volumes:
      - ${ZAKURAD_BIN:-../target/debug/zakurad}:/usr/local/bin/zakurad:ro
      - ${ZAKURA_NODE4_CONFIG:-./zakura-regtest-e2e/node4.toml}:/etc/zakura/node4.toml:ro
      - ${ZAKURA_E2E_TRACE_DIR:-/tmp/zakura-regtest-e2e-traces}:/traces
