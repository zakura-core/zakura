[defaults]
branch = "main"
remote = "origin"
repo_dir = "/root/zakura"
service_name = "zakura.service"
controller_service_name = "zakura-continuous-sync.service"
bin_path = "/usr/local/bin/zakurad"
config_path = "/etc/zakura/zebrad.toml"
controller_config_path = "/etc/zakura-continuous-sync/controller.toml"
config_template_path = "/etc/zakura-continuous-sync/zakurad.toml.template"
state_dir = "/var/lib/zakura-continuous-sync"
runs_dir = "/var/log/zakura/runs"
chain_state_dir = "/var/lib/zakura"
wipe_sentinel = "/var/lib/zakura/.continuous-sync-wipe-ok"
build_cache_dir = "/var/lib/zakura-continuous-sync/build-cache"
log_file = "/var/log/zakura/zebrad.log"
monitor_log = "/var/log/zakura/monitor.log"
trace_link = "/var/log/zakura/traces"
alert_config_path = "/etc/zakura-continuous-sync/alert-monitor.toml"
alert_state_file = "/var/lib/zakura-monitor/cluster-state.json"
alert_env_file = "/etc/zakura-alerts.env"
alert_ssh_key = "/root/.ssh/zakura_monitor_ed25519"
alert_status_command = "/usr/local/sbin/zakura-monitor-status.py"
alert_throttle_seconds = 1800
down_confirmation_samples = 2
cluster_stall_seconds = 600
metrics_url = "http://127.0.0.1:9999/metrics"
ready_url = "http://127.0.0.1:8080/ready"
healthy_url = "http://127.0.0.1:8080/healthy"
poll_interval_seconds = 30
startup_timeout_seconds = 600
stall_seconds = 600
max_run_seconds = 172800
ready_samples = 6
ready_sample_interval_seconds = 30
min_free_bytes = 10737418240
retention_runs = 3
cooldown_seconds = 60
wipe_entries = ["state", "non_finalized_state"]
preserve_entries = ["network"]
tracing_filter = "info,zakura_network::zakura=debug,zakura_network::zakura::transport::guard=error,zebrad::commands::start::zakura=debug,iroh=error,iroh::magicsock=error,iroh_quinn_udp=error"

