name: zcashd-compat Regtest

# Runs the managed zcashd-compat Regtest integration suite after every merge to main.
#
# The test harness spawns a fresh zebrad and zcashd (managed download) on
# randomised ports, so no external infrastructure is required.
on:
  push:
    branches: [main]

  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.head_ref || github.run_id }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1
  RUST_LIB_BACKTRACE: 1
  RUST_LOG: info
  COLORBT_SHOW_HIDDEN: 1

jobs:
  zcashd-compat-regtest:
    name: zcashd-compat regtest suite
    permissions:
      contents: read
    runs-on: ubuntu-latest
    timeout-minutes: 120

    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 #v7.0.0
        with:
          persist-credentials: false

      - uses: actions-rust-lang/setup-rust-toolchain@46268bd060767258de96ed93c1251119784f2ab6 #v1.16.1
        with:
          toolchain: stable
          cache-key: zcashd-compat-regtest
          cache-on-failure: true

      - uses: taiki-e/install-action@8b3c737da4b541bf0fb5a3e0488ff20535badac9 #v2.82.1
        with:
          tool: cargo-nextest

      - uses: ./.github/actions/setup-zebra-build

      # Uses the managed zcashd download (TEST_ZCASHD_PATH unset).
      - name: Run zcashd-compat regtest suite
        run: make compat-test-regtest
