name: Unit Tests

on:
  pull_request:
    branches: [main, "feat/**", "release/**"]
    types: [opened, synchronize, reopened, ready_for_review, labeled, unlabeled]
    paths:
      - "**/*.rs"
      - "**/Cargo.toml"
      - "**/Cargo.lock"
      - zakura-chain/src/parameters/checkpoint/main-checkpoints.txt
      - zakura-state/src/service/finalized_state/vct/mainnet-frontier.bin
      - zakura-state/src/service/finalized_state/vct/mainnet-frontier.json
      - .config/nextest.toml
      - .github/workflows/tests-unit.yml

  push:
    branches: [main]
    paths:
      - "**/*.rs"
      - "**/Cargo.toml"
      - "**/Cargo.lock"
      - zakura-chain/src/parameters/checkpoint/main-checkpoints.txt
      - zakura-state/src/service/finalized_state/vct/mainnet-frontier.bin
      - zakura-state/src/service/finalized_state/vct/mainnet-frontier.json
      - .config/nextest.toml
      - .github/workflows/tests-unit.yml

  # Run the full unit-test suite when a PR is queued so the merge queue validates
  # the merged result against the latest `main`. `merge_group` ignores path
  # filters, so this runs unconditionally on every queued entry.
  merge_group:

  schedule:
    # Keep release-mode coverage off the critical PR path.
    - cron: "0 8 * * *"

  workflow_dispatch:

# Ensures that only one workflow task will run at a time. Previous builds, if
# already in process, will get cancelled. Only the latest commit will be allowed
# to run, cancelling any workflows in between
concurrency:
  group: ${{ github.workflow }}-${{ github.head_ref || github.run_id }}
  cancel-in-progress: true

permissions:
  contents: read
  pull-requests: read

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1
  RUST_LIB_BACKTRACE: 1
  RUST_LOG: info
  COLORBT_SHOW_HIDDEN: 1

jobs:
  # Compile the whole workspace and every test binary ONCE, then hand the result
  # to the shard jobs as a nextest archive. Previously each of the 3 shards ran
  # `cargo nextest run`, so each recompiled the full workspace + all dependencies
  # from scratch — the same ~5m compile floor paid three times in parallel, and
  # three jobs racing to save one shared build cache (only one save ever wins).
  # Building once removes two of the three compile passes and takes compilation
  # off the critical path of every shard.
  build-tests:
    name: build test binaries (${{ github.event_name == 'pull_request' && 'debug' || 'release' }})
    permissions:
      contents: read
      id-token: write
      statuses: write
    runs-on: ubuntu-latest
    timeout-minutes: 120
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 #v7.0.0
        with:
          persist-credentials: false
      - uses: actions-rust-lang/setup-rust-toolchain@166cdcfd11aee3cb47222f9ddb555ce30ddb9659 #v1.17.0
        with:
          toolchain: stable
          # Single writer for this cache key, so the save no longer races the
          # other shards ("Unable to reserve cache … another job").
          cache-key: unit-tests-ubuntu-latest-stable-default-release-binaries-${{ github.event_name == 'pull_request' && 'debug' || 'release' }}
          cache-on-failure: true
      - uses: taiki-e/install-action@43aecc8d72668fbcfe75c31400bc4f890f1c5853 #v2.83.2
        with:
          tool: cargo-nextest
      - uses: ./.github/actions/setup-zakura-build

      - name: Build and archive test binaries
        run: |
          # The archive stores compiled binaries, so it must be built in the same
          # mode the shards run. The run-time-only filters (`--profile`,
          # `--partition`, `--run-ignored`) are applied by the shard jobs, not here.
          if [[ "${FULL_COVERAGE}" == "true" ]]; then
            cargo nextest archive --locked --release --features default-release-binaries --archive-file "${RUNNER_TEMP}/nextest-archive.tar.zst"
          else
            cargo nextest archive --locked --features default-release-binaries --archive-file "${RUNNER_TEMP}/nextest-archive.tar.zst"
          fi
        env:
          FULL_COVERAGE: ${{ github.event_name != 'pull_request' }}

      - name: Upload nextest archive
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a #v7.0.1
        with:
          name: nextest-archive
          path: ${{ runner.temp }}/nextest-archive.tar.zst
          retention-days: 1
          if-no-files-found: error
          compression-level: 0 # already zstd-compressed

  unit-tests:
    name: ${{ matrix.rust-version }} on ${{ matrix.os }} (shard ${{ matrix.partition }}/3)
    needs: build-tests
    permissions:
      contents: read
      id-token: write
      statuses: write
    runs-on: ${{ matrix.os }}
    timeout-minutes: 60
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest]
        rust-version: [stable]
        # Run only this shard's 1/3 slice of the tests from the prebuilt archive
        # via nextest `--partition`. No compilation happens here.
        partition: [1, 2, 3]

    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 #v7.0.0
        with:
          persist-credentials: false
      - uses: actions-rust-lang/setup-rust-toolchain@166cdcfd11aee3cb47222f9ddb555ce30ddb9659 #v1.17.0
        with:
          toolchain: ${{ matrix.rust-version }}
          # Nothing is compiled in this job, so there is no build cache to keep.
          cache: false
      - uses: taiki-e/install-action@43aecc8d72668fbcfe75c31400bc4f890f1c5853 #v2.83.2
        with:
          tool: cargo-nextest
      # RocksDB is dynamically linked, so the prebuilt test binaries still need
      # librocksdb present at run time (protoc is only needed to build).
      - uses: ./.github/actions/setup-zakura-build
      - name: Download nextest archive
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c #v8.0.1
        with:
          name: nextest-archive
          path: ${{ runner.temp }}

      - name: Run unit tests
        run: |
          if [[ "${FULL_COVERAGE}" == "true" ]]; then
            cargo nextest run --profile full-tests --archive-file "${RUNNER_TEMP}/nextest-archive.tar.zst" --run-ignored=all --partition "hash:${{ matrix.partition }}/3"
          else
            cargo nextest run --profile all-tests --archive-file "${RUNNER_TEMP}/nextest-archive.tar.zst" --partition "hash:${{ matrix.partition }}/3"
          fi
        env:
          FULL_COVERAGE: ${{ github.event_name != 'pull_request' }}

  zakura-config:
    name: zakura config compatibility
    permissions:
      contents: read
      id-token: write
      statuses: write
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 #v7.0.0
        with:
          persist-credentials: false
      - uses: actions-rust-lang/setup-rust-toolchain@166cdcfd11aee3cb47222f9ddb555ce30ddb9659 #v1.17.0
        with:
          toolchain: stable
          # These acceptance jobs all do the same debug build of the workspace
          # with the same features, so they share one build cache instead of each
          # keeping its own multi-GB copy. `cache-shared-key` (unlike `cache-key`,
          # which only appends to a per-job key and never shares) is stable across
          # jobs, so the first to run warms the cache and the rest restore it.
          cache-shared-key: zakura-drb-debug
          cache-on-failure: true
      - uses: taiki-e/install-action@43aecc8d72668fbcfe75c31400bc4f890f1c5853 #v2.83.2
        with:
          tool: cargo-nextest
      - uses: ./.github/actions/setup-zakura-build
      - name: Check generated zakurad config compatibility
        run: cargo nextest run --profile zakura-config --locked --features default-release-binaries --no-fail-fast

  network-dependent:
    name: network-dependent acceptance tests
    permissions:
      contents: read
      id-token: write
      statuses: write
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 #v7.0.0
        with:
          persist-credentials: false
      - uses: actions-rust-lang/setup-rust-toolchain@166cdcfd11aee3cb47222f9ddb555ce30ddb9659 #v1.17.0
        with:
          toolchain: stable
          cache-shared-key: zakura-drb-debug
          cache-on-failure: true
      - uses: taiki-e/install-action@43aecc8d72668fbcfe75c31400bc4f890f1c5853 #v2.83.2
        with:
          tool: cargo-nextest
      - uses: ./.github/actions/setup-zakura-build
      - name: Run network-dependent acceptance tests
        run: cargo nextest run --profile zakura-network-dependent --locked --features default-release-binaries --no-fail-fast

  pruned-storage:
    name: pruned storage acceptance test
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    permissions:
      contents: read
      id-token: write
      statuses: write
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 #v7.0.0
        with:
          persist-credentials: false
      - uses: actions-rust-lang/setup-rust-toolchain@166cdcfd11aee3cb47222f9ddb555ce30ddb9659 #v1.17.0
        with:
          toolchain: stable
          cache-shared-key: zakura-drb-debug
          cache-on-failure: true
      - uses: taiki-e/install-action@43aecc8d72668fbcfe75c31400bc4f890f1c5853 #v2.83.2
        with:
          tool: cargo-nextest
      - uses: ./.github/actions/setup-zakura-build
      - name: Run pruned storage acceptance test
        run: cargo nextest run --profile zakura-pruned-storage --locked --features default-release-binaries --no-fail-fast

  check-no-git-dependencies:
    name: Check no git dependencies
    permissions:
      contents: read
      id-token: write
      statuses: write
    runs-on: ubuntu-latest
    timeout-minutes: 30
    if: contains(github.event.pull_request.labels.*.name, 'A-release')
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 #v7.0.0
        with:
          persist-credentials: false
      - uses: actions-rust-lang/setup-rust-toolchain@166cdcfd11aee3cb47222f9ddb555ce30ddb9659 #v1.17.0
        with:
          toolchain: stable
          cache-on-failure: true
      - uses: taiki-e/install-action@43aecc8d72668fbcfe75c31400bc4f890f1c5853 #v2.83.2
        with:
          tool: cargo-nextest
      - uses: ./.github/actions/setup-zakura-build
      - name: Check no git dependencies
        run: cargo nextest run --profile check-no-git-dependencies --locked --run-ignored=only

  # NOTE: the Zakura regtest e2e jobs moved to `zakura-e2e.yml` so they can be
  # path-gated independently of the broad Rust filter here (they run on
  # Zakura-relevant PRs, always in the merge queue, and nightly for long modes).

  test-success:
    name: test success
    runs-on: ubuntu-latest
    if: always()
    needs:
      - build-tests
      - unit-tests
      - zakura-config
      - network-dependent
      - pruned-storage
      - check-no-git-dependencies
    timeout-minutes: 30
    steps:
      - name: Decide whether the needed jobs succeeded or failed
        uses: re-actors/alls-green@05ac9388f0aebcb5727afa17fcccfecd6f8ec5fe #v1.2.2
        with:
          jobs: ${{ toJSON(needs) }}
          # The release-only dependency check is skipped outside its event scope.
          # Failed, non-skipped jobs still fail this aggregate status.
          allowed-skips: check-no-git-dependencies, pruned-storage
