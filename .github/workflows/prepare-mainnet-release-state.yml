# Import a checkpoint and matching VCT frontier from one immutable R2 bundle.
# The source changes always go through a draft pull request before a release.
name: Prepare Mainnet release state

on:
  workflow_dispatch:

permissions: {}

concurrency:
  group: prepare-mainnet-release-state
  cancel-in-progress: false

jobs:
  prepare:
    name: Import Mainnet release state
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    environment: release-automation
    permissions:
      contents: read
    steps:
      - name: Create release GitHub App token
        id: app-token
        uses: actions/create-github-app-token@bcd2ba49218906704ab6c1aa796996da409d3eb1 #v3.2.0
        with:
          client-id: ${{ vars.RELEASE_APP_CLIENT_ID }}
          private-key: ${{ secrets.RELEASE_APP_PRIVATE_KEY }}
          permission-contents: write
          permission-pull-requests: write

      - name: Checkout main
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 #v7.0.0
        with:
          fetch-depth: 0
          persist-credentials: false
          ref: main
          token: ${{ steps.app-token.outputs.token }}

      - uses: actions-rust-lang/setup-rust-toolchain@166cdcfd11aee3cb47222f9ddb555ce30ddb9659 #v1.17.0
        with:
          toolchain: stable

      - name: Test bundle resolver
        run: .github/scripts/fetch-mainnet-release-state-test.py

      - name: Fetch one immutable bundle
        env:
          LATEST_URL: ${{ vars.MAINNET_RELEASE_STATE_LATEST_URL }}
        run: |
          if [ -z "$LATEST_URL" ]; then
            echo "Set the MAINNET_RELEASE_STATE_LATEST_URL repository variable." >&2
            exit 1
          fi
          .github/scripts/fetch-mainnet-release-state.py \
            --latest-url "$LATEST_URL" \
            --output-dir "$RUNNER_TEMP/mainnet-release-state" \
            --metadata-out "$RUNNER_TEMP/mainnet-release-state-resolution.json" \
            --max-age-hours 48

      - name: Import checkpoint and frontier
        run: |
          cargo run --locked \
            -p zakura-utils \
            --features zakura-release-state \
            --bin zakura-release-state \
            -- import \
            --bundle-dir "$RUNNER_TEMP/mainnet-release-state" \
            --source-dir .

      - name: Verify committed-source contract
        run: |
          cargo run --locked \
            -p zakura-utils \
            --features zakura-release-state \
            --bin zakura-release-state \
            -- verify-source \
            --source-dir . \
            --require-bundle-provenance
          .github/scripts/validate-checkpoints.sh \
            zakura-chain/src/parameters/checkpoint/main-checkpoints.txt

      - name: Check generated diff
        id: changes
        run: |
          set -euo pipefail

          git diff --check HEAD
          {
            git diff --name-only HEAD
            git ls-files --others --exclude-standard
          } | sort -u > "$RUNNER_TEMP/actual-release-state-files"
          cat > "$RUNNER_TEMP/allowed-release-state-files" <<'EOF'
          zakura-chain/src/parameters/checkpoint/main-checkpoints.txt
          zakura-state/src/service/finalized_state/vct/mainnet-frontier.bin
          zakura-state/src/service/finalized_state/vct/mainnet-frontier.json
          EOF
          sort -o "$RUNNER_TEMP/allowed-release-state-files" \
            "$RUNNER_TEMP/allowed-release-state-files"

          unexpected="$({
            comm -23 \
              "$RUNNER_TEMP/actual-release-state-files" \
              "$RUNNER_TEMP/allowed-release-state-files"
          } || true)"
          if [ -n "$unexpected" ]; then
            echo "Importer changed files outside the release-state allowlist:" >&2
            echo "$unexpected" >&2
            exit 1
          fi

          if [ ! -s "$RUNNER_TEMP/actual-release-state-files" ]; then
            echo "The resolved bundle is already committed; no pull request is needed."
            echo "has_changes=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          python3 - \
            "$RUNNER_TEMP/mainnet-release-state-resolution.json" \
            "$GITHUB_OUTPUT" <<'PY'
          import json
          import sys

          with open(sys.argv[1], encoding="utf-8") as source:
              resolution = json.load(source)
          with open(sys.argv[2], "a", encoding="utf-8") as output:
              for key in (
                  "height",
                  "block_hash",
                  "generated_at",
                  "manifest_url",
                  "manifest_sha256",
              ):
                  print(f"{key}={resolution[key]}", file=output)
              print("has_changes=true", file=output)
          PY

          git diff --stat

      - name: Open or update draft pull request
        if: steps.changes.outputs.has_changes == 'true'
        uses: peter-evans/create-pull-request@5f6978faf089d4d20b00c7766989d076bb2fc7f1 #v8.1.1
        with:
          token: ${{ steps.app-token.outputs.token }}
          branch: adam/update-mainnet-release-state
          base: main
          title: "chore(chain): update Mainnet checkpoint and VCT frontier"
          body: |
            Updates the embedded Mainnet checkpoint and matching VCT frontier from a single immutable release-state bundle.

            - Finalized height: `${{ steps.changes.outputs.height }}`
            - Finalized hash: `${{ steps.changes.outputs.block_hash }}`
            - Generated at: `${{ steps.changes.outputs.generated_at }}`
            - Manifest: `${{ steps.changes.outputs.manifest_url }}`
            - Manifest SHA-256: `${{ steps.changes.outputs.manifest_sha256 }}`

            The release preflight verifies the committed checkpoint, frontier, and provenance together. Release creation does not consult the moving R2 pointer.
          labels: A-release
          commit-message: "chore(chain): update Mainnet checkpoint and VCT frontier"
          sign-commits: true
          draft: always-true
          delete-branch: true
