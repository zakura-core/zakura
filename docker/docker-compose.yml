services:
  zakura:
    container_name: zakura
    image: zakuracore/zakura
    platform: linux/amd64
    restart: unless-stopped
    deploy:
      resources:
        reservations:
          cpus: "4"
          memory: 16G
    env_file:
      - .env
    volumes:
      - zakura-cache:/home/zebra/.cache/zakura
    # Having `tty` set to true makes Zakura use colored logs.
    tty: true
    # ! Comment out the `configs` mapping below to use the environment variables in the
    # ! `.env` file, instead of the default configuration file.
    configs:
      - source: zakura-config
        target: /home/zebra/.config/zakura.toml

    # P2P port for inbound peer connections (recommended).
    ports:
      - "8233:8233"   # P2P on Mainnet (use 18233:18233 for Testnet)

    # Uncomment any of these to expose additional services:
    #   - "18233:18233" # P2P on Testnet
    #   - "8232:8232"   # RPC endpoint on Mainnet
    #   - "18232:18232" # RPC endpoint on Testnet
    #   - "9999:9999"   # Metrics
    #   - "3000:3000"   # Tracing
    #   - "8080:8080"   # Health endpoints (/healthy, /ready)

configs:
  zakura-config:
    #! To customize the default configuration, edit this file before starting
    #! the container.
    file: ./default-zakura-config.toml

volumes:
  zakura-cache:
    driver: local
