# Lychee link checker configuration for Zakura
# https://github.com/lycheeverse/lychee

# Exclude patterns
exclude = [
    # GitHub compare links (often temporary)
    "^https://github.com/.*/compare/",
    # Local development URLs
    "^https?://localhost",
    "^https?://127\\.0\\.0\\.1",
    "^https?://0\\.0\\.0\\.0",
    # Placeholder URLs
    "^https?://example\\.com",
    # Rate-limited or auth-required
    "^https://crates\\.io/crates/",
    # GitHub pages requiring authentication
    "^https://github.com/.*/settings",
    "^https://github.com/organizations/.*/settings",
    # GitHub old run IDs (change frequently)
    "^https://github.com/.*/runs/",
    # Template placeholder URLs (0000)
    "^https://github.com/.*/issues/0000",
    "^https://github.com/.*/pull/0000",
    # Merged PR references are permanent, but GitHub intermittently returns 502
    # responses for them, causing link-check flakes with no broken-link signal.
    "^https://github.com/zakura-core/zakura/pull/[0-9]+",
    # Mergify dashboard (requires auth)
    "^https://dashboard.mergify.com/",
    # IACR eprint server returns 403 to automated link checkers
    "^https://eprint\\.iacr\\.org/",
    # Tor's GitLab returns 403 to automated link checkers
    "^https://gitlab\\.torproject\\.org/",
    # Zcash-hosted sites intermittently return Cloudflare 521 responses to CI
    "^https://tachyon\\.z\\.cash/",
    "^https://zips\\.z\\.cash/",

    # These routes will become available when the Zakura website launches.
    "^https://zakura\\.com/",
    "^https://zakura-core\\.github\\.io/zakura/",

    # Remove after the stable Zakura crates have been published to docs.rs.
    "^https://docs\\.rs/zakura(?:-[a-z0-9-]+)?/latest/",

    # Dead upstream links in historical audit document (zebra-dependencies-for-audit.md)
    "^https://github.com/iqlusioninc/abscissa/tree/develop",
    "^https://github.com/servo/bincode/releases/tag/v1\\.3\\.3",
]

# Exclude paths
exclude_path = [
    "node_modules",
    "target",
    ".git",
    "zakura-rpc/qa/rpc-tests",
    "supply-chain",
    # Contains intentionally unresolved ADR filename placeholders.
    "docs/decisions/template.md",
    # CHANGELOG contains historical references to deprecated URLs
    "CHANGELOG.md",
]

# Accept these HTTP status codes as valid. 202 is included because z.cash and
# zfnd.org intermittently return "202 Accepted" to automated checkers (CDN bot
# protection) — the link is not broken, the content just wasn't served.
accept = ["200", "202", "204", "206", "301", "302", "307", "308", "429"]

# Timeout for requests (seconds)
timeout = 30

# Skip checking private/internal IP addresses
exclude_private = true
exclude_loopback = true

# Cache results to avoid repeated checks
cache = true

# Maximum age of cached results
max_cache_age = "7d"

# Maximum concurrent requests
max_concurrency = 8

# User agent string
user_agent = "lychee/0.24 (Zakura link checker; https://github.com/zakura-core/zakura)"

# Skip checking mail addresses
include_mail = false

# Retry configuration
max_retries = 3
retry_wait_time = 10
