name: Lint

on:
  pull_request:
    branches: [main, "feat/**", "release/**"]
    paths:
      - "**/*.rs"
      - "**/Cargo.toml"
      - "**/Cargo.lock"
      - clippy.toml
      - .cargo/config.toml
      - .github/workflows/lint.yml
      - supply-chain/**

  push:
    branches: [main, "feat/**", "release/**"]
    paths:
      - "**/*.rs"
      - "**/Cargo.toml"
      - "**/Cargo.lock"
      - clippy.toml
      - .cargo/config.toml
      - .github/workflows/lint.yml
      - supply-chain/**

  # Run the full lint suite when a PR is queued so the merge queue validates the
  # merged result against the latest `main`. `merge_group` ignores path filters,
  # so this runs unconditionally on every queued entry.
  merge_group:

  # Nightly run for the expensive, non-gating lints (unused-deps, docs) that are
  # gated off the PR/merge path below.
  schedule:
    - cron: "0 8 * * *"

  workflow_dispatch:

# Ensures that only one workflow task will run at a time. Previous builds, if
# already in process, will get cancelled. Only the latest commit will be allowed
# to run, cancelling any workflows in between
concurrency:
  group: ${{ github.workflow }}-${{ github.head_ref || github.run_id }}
  cancel-in-progress: true

permissions:
  contents: read
  pull-requests: read

env:
  CLICOLOR: 1

jobs:
  clippy:
    name: clippy ${{ matrix.rust-version }} / ${{ matrix.type }}
    permissions:
      contents: read
      id-token: write
      statuses: write
    runs-on: ubuntu-latest
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        # `beta` was dropped from the PR path: it doubled the clippy compile
        # cost for marginal early-warning value. Re-add it on the nightly
        # schedule if upcoming-toolchain regressions need tracking.
        rust-version: [stable]
        type: [release, tests]
        include:
          - type: release
            args: --workspace --all-targets
            features: default-release-binaries
          - type: tests
            args: --workspace --all-targets
            features: default-release-binaries proptest-impl lightwalletd-grpc-tests zebra-checkpoints

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd #v6.0.2
        with:
          persist-credentials: false
      - uses: actions-rust-lang/setup-rust-toolchain@46268bd060767258de96ed93c1251119784f2ab6 #v1.16.1
        with:
          components: clippy
          toolchain: ${{ matrix.rust-version }}
          cache-on-failure: true
      - uses: ./.github/actions/setup-zebra-build
      - name: Run clippy
        run: cargo clippy ${{ matrix.args }} --features "${{ matrix.features }}"

  # NOTE: per-crate default / no-default-features checks moved to
  # `test-crates.yml`, which runs `cargo hack check --workspace` (and again with
  # `--no-default-features`) in a single warm target dir, subsuming the old
  # `crate-checks` and `features` jobs.

  msrv:
    name: MSRV
    permissions:
      contents: read
      id-token: write
      statuses: write
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd #v6.0.2
        with:
          persist-credentials: false
      - uses: actions-rust-lang/setup-rust-toolchain@46268bd060767258de96ed93c1251119784f2ab6 #v1.16.1
        with:
          toolchain: 1.91 # MSRV
          cache-on-failure: true
      - uses: ./.github/actions/setup-zebra-build
      # Build every workspace binary (and, transitively, every library) on the
      # MSRV toolchain in a single warm target dir instead of a per-binary
      # matrix. `zakura-watchdog` is excluded: it depends on `sentry`, which
      # requires a newer rustc than the workspace library MSRV.
      - run: cargo build --workspace --bins --exclude zakura-watchdog

  docs:
    name: docs
    # A full `--all-features --document-private-items` doc build is expensive and
    # not a correctness gate (book.yml builds docs on push to main). Run it
    # nightly / on demand only, keeping it off the PR critical path.
    if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'
    permissions:
      contents: read
      statuses: write
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd #v6.0.2
        with:
          persist-credentials: false
      - uses: actions-rust-lang/setup-rust-toolchain@46268bd060767258de96ed93c1251119784f2ab6 #v1.16.1
        with:
          toolchain: nightly
          cache-on-failure: true
      - uses: ./.github/actions/setup-zebra-build
      - run: cargo doc --no-deps --workspace --all-features --document-private-items --target-dir "$(pwd)"/target/internal
        env:
          # Keep in sync with ./book.yml:jobs.build
          # The -A and -W settings must be the same as the `rustdocflags` in:
          # https://github.com/ZcashFoundation/zebra/blob/main/.cargo/config.toml#L87
          RUSTDOCFLAGS: --html-in-header katex-header.html -A rustdoc::private_intra_doc_links -D warnings

  fmt:
    name: fmt
    permissions:
      contents: read
      statuses: write
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd #v6.0.2
        with:
          persist-credentials: false
      - uses: actions-rust-lang/setup-rust-toolchain@46268bd060767258de96ed93c1251119784f2ab6 #v1.16.1
        with:
          toolchain: nightly
          components: rustfmt
      - name: Run fmt
        run: cargo fmt --all -- --check

  unused-deps:
    name: unused-deps
    # cargo-udeps needs a clean from-scratch nightly build and is not a
    # correctness gate (unused deps don't break compilation). Run it nightly /
    # on demand only, keeping it off the PR critical path.
    if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'
    permissions:
      contents: read
      id-token: write
      statuses: write
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd #v6.0.2
        with:
          persist-credentials: false
      - uses: actions-rust-lang/setup-rust-toolchain@46268bd060767258de96ed93c1251119784f2ab6 #v1.16.1
        with:
          toolchain: nightly
          cache-on-failure: true
      - uses: taiki-e/install-action@65851e10cd6c377f11a60e600abc07cb08643468 #v2.79.3
        with:
          tool: cargo-udeps
      - uses: ./.github/actions/setup-zebra-build
      - run: cargo udeps --workspace --all-targets --all-features --locked

  no-test-deps:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd #v6.0.2
        with:
          persist-credentials: false

      - uses: actions-rust-lang/setup-rust-toolchain@46268bd060767258de96ed93c1251119784f2ab6 #v1.16.1
        with:
          toolchain: stable
          cache-on-failure: true
      - name: Ensure no arbitrary or proptest dependency on default build
        run: cargo tree --package zakura -e=features,no-dev | grep -Eq "arbitrary|proptest" && exit 1 || exit 0

  # NOTE: the old `features` job (`cargo hack check --all`) is subsumed by the
  # `cargo hack check --workspace` pass in `test-crates.yml`.

  check-cargo-lock:
    name: check-cargo-lock
    permissions:
      contents: read
      id-token: write
      statuses: write
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd #v6.0.2
        with:
          persist-credentials: false
      - uses: actions-rust-lang/setup-rust-toolchain@46268bd060767258de96ed93c1251119784f2ab6 #v1.16.1
        with:
          toolchain: stable
          cache-on-failure: true
      - uses: ./.github/actions/setup-zebra-build
      - run: cargo check --locked --all-features --all-targets

  deny:
    name: Check deny ${{ matrix.checks }} ${{ matrix.features }}
    permissions:
      contents: read
      statuses: write
    runs-on: ubuntu-latest
    strategy:
      matrix:
        checks:
          - bans
          - sources
          - advisories
          - licenses
        # We don't need to check `--no-default-features` here, because (except in very rare cases):
        # - disabling features isn't going to add duplicate dependencies
        # - disabling features isn't going to add more crate sources
        # For advisories and licenses, feature flags don't change the dependency tree materially,
        # so we only need the default and --all-features variants.
        features: ["", --features default-release-binaries, --all-features]
      # Always run the --all-features job, to get accurate "skip tree root was not found" warnings
      fail-fast: false

    # Prevent sudden announcement of a new advisory from failing ci:
    continue-on-error: ${{ matrix.checks == 'advisories' }}

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd #v6.0.2
        with:
          persist-credentials: false
      - uses: actions-rust-lang/setup-rust-toolchain@46268bd060767258de96ed93c1251119784f2ab6 #v1.16.1
        with:
          cache-on-failure: true
      # Install cargo-deny from a prebuilt binary instead of the EmbarkStudios
      # Docker action: that action rebuilds a container from a Docker Hub base
      # image on every run, which intermittently fails with registry timeouts.
      - uses: taiki-e/install-action@65851e10cd6c377f11a60e600abc07cb08643468 #v2.79.3
        with:
          tool: cargo-deny@0.19.5
      - name: Check ${{ matrix.checks }} with features ${{ matrix.features }}
        # --all-features spuriously activates openssl, but we want to ban that dependency in
        # all of zebrad's production features for security reasons. But the --all-features job is
        # the only job that gives accurate "skip tree root was not found" warnings.
        # In other jobs, we expect some of these warnings, due to disabled features.
        run: cargo deny --workspace ${{ matrix.features }} check ${{ matrix.checks }} ${{ matrix.features == '--all-features' && '--allow banned' || '--allow unmatched-skip-root' }}

  vet:
    name: cargo-vet check
    permissions:
      contents: read
      statuses: write
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd #v6.0.2
        with:
          persist-credentials: false
      - uses: actions-rust-lang/setup-rust-toolchain@46268bd060767258de96ed93c1251119784f2ab6 #v1.16.1
        with:
          cache-on-failure: true
      - name: Install cargo-vet
        uses: taiki-e/install-action@65851e10cd6c377f11a60e600abc07cb08643468 #v2.79.3
        with:
          tool: cargo-vet
      - name: Run cargo-vet check
        run: cargo vet check

  lint-success:
    name: lint success
    runs-on: ubuntu-latest
    if: always()
    needs:
      - clippy
      - docs
      - fmt
      - unused-deps
      - check-cargo-lock
      - no-test-deps
      - deny
      - vet
    timeout-minutes: 30
    steps:
      - name: Decide whether the needed jobs succeeded or failed
        uses: re-actors/alls-green@05ac9388f0aebcb5727afa17fcccfecd6f8ec5fe #v1.2.2
        with:
          jobs: ${{ toJSON(needs) }}
          # docs and unused-deps run only on the nightly schedule / on demand,
          # so they are skipped (not failed) on the PR and merge paths.
          allowed-skips: docs, unused-deps
