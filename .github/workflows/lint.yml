name: Lint

on:
  pull_request:
    branches: [main, "feat/**", "release/**"]
    paths:
      - "**/*.rs"
      - "**/Cargo.toml"
      - "**/Cargo.lock"
      - clippy.toml
      - .cargo/config.toml
      - .github/workflows/lint.yml
      - supply-chain/**
      - "scripts/**.sh"
      - ".github/workflows/scripts/**"
      # ci-python-tests covers these suites, so changes to them must trigger it.
      - "deploy/**"
      - ".github/scripts/**"

  push:
    branches: [main, "feat/**", "release/**"]
    paths:
      - "**/*.rs"
      - "**/Cargo.toml"
      - "**/Cargo.lock"
      - clippy.toml
      - .cargo/config.toml
      - .github/workflows/lint.yml
      - supply-chain/**
      - "scripts/**.sh"
      - ".github/workflows/scripts/**"
      # ci-python-tests covers these suites, so changes to them must trigger it.
      - "deploy/**"
      - ".github/scripts/**"

  # Run the full lint suite when a PR is queued so the merge queue validates the
  # merged result against the latest `main`. `merge_group` ignores path filters,
  # so this runs unconditionally on every queued entry.
  merge_group:

  # Nightly run for the expensive, non-gating lints (unused-deps, docs) that are
  # gated off the PR/merge path below.
  schedule:
    - cron: "0 8 * * *"

  workflow_dispatch:

# Ensures that only one workflow task will run at a time. Previous builds, if
# already in process, will get cancelled. Only the latest commit will be allowed
# to run, cancelling any workflows in between
concurrency:
  group: ${{ github.workflow }}-${{ github.head_ref || github.run_id }}
  cancel-in-progress: true

permissions:
  contents: read
  pull-requests: read

env:
  CLICOLOR: 1

jobs:
  rust-checks:
    name: rust checks
    permissions:
      contents: read
      id-token: write
      statuses: write
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 #v7.0.1
        with:
          persist-credentials: false
      - uses: actions-rust-lang/setup-rust-toolchain@166cdcfd11aee3cb47222f9ddb555ce30ddb9659 #v1.17.0
        with:
          components: clippy
          toolchain: stable
          cache-on-failure: true
          cache-save-if: ${{ github.ref == 'refs/heads/main' }}
      - uses: ./.github/actions/setup-zakura-build
      - name: Run clippy
        run: cargo clippy --workspace --all-targets --features default-release-binaries
      - name: Check locked all-feature build
        if: ${{ !cancelled() }}
        run: cargo check --locked --all-features --all-targets

  # NOTE: per-crate default / no-default-features checks moved to
  # `test-crates.yml`, which runs `cargo hack check --workspace` (and again with
  # `--no-default-features`) in a single warm target dir, subsuming the old
  # `crate-checks` and `features` jobs.

  msrv:
    name: MSRV
    permissions:
      contents: read
      id-token: write
      statuses: write
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 #v7.0.1
        with:
          persist-credentials: false
      - uses: actions-rust-lang/setup-rust-toolchain@166cdcfd11aee3cb47222f9ddb555ce30ddb9659 #v1.17.0
        with:
          toolchain: 1.91 # MSRV
          # Keep this non-critical-path check cold rather than reserving 1.2 GB
          # of the repository's Actions cache for a separate Rust toolchain.
          cache: false
      - uses: ./.github/actions/setup-zakura-build
      # Type-check every workspace binary (and, transitively, every library) on
      # the MSRV toolchain. Stable CI retains final code generation and linking
      # coverage. `zakura-watchdog` is excluded: it depends on `sentry`, which
      # requires a newer rustc than the workspace library MSRV.
      - run: cargo check --workspace --bins --exclude zakura-watchdog

  docs:
    name: docs
    # A full `--all-features --document-private-items` doc build is expensive and
    # not a correctness gate. Run it nightly / on demand only, keeping it off the
    # PR critical path.
    if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'
    permissions:
      contents: read
      statuses: write
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 #v7.0.1
        with:
          persist-credentials: false
      - uses: actions-rust-lang/setup-rust-toolchain@166cdcfd11aee3cb47222f9ddb555ce30ddb9659 #v1.17.0
        with:
          toolchain: nightly
          cache-on-failure: true
          cache-save-if: ${{ github.ref == 'refs/heads/main' }}
      - uses: ./.github/actions/setup-zakura-build
      - run: cargo doc --no-deps --workspace --all-features --document-private-items --target-dir "$(pwd)"/target/internal
        env:
          # The -A and -W settings must be the same as the `rustdocflags` in:
          # https://github.com/ZcashFoundation/zebra/blob/main/.cargo/config.toml#L87
          RUSTDOCFLAGS: -A rustdoc::private_intra_doc_links -D warnings

  fast-lints:
    name: fast lints
    permissions:
      contents: read
      statuses: write
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 #v7.0.1
        with:
          persist-credentials: false
      - uses: actions-rust-lang/setup-rust-toolchain@166cdcfd11aee3cb47222f9ddb555ce30ddb9659 #v1.17.0
        with:
          toolchain: stable
          # These checks do not compile workspace crates.
          cache: false
      - uses: actions-rust-lang/setup-rust-toolchain@166cdcfd11aee3cb47222f9ddb555ce30ddb9659 #v1.17.0
        with:
          toolchain: nightly
          components: rustfmt
          cache: false
      - name: Run fmt
        if: ${{ !cancelled() }}
        run: cargo +nightly fmt --all -- --check
      - name: Run shellcheck
        if: ${{ !cancelled() }}
        # .github/workflows/scripts/*.sh included: those run on provisioned
        # droplets, where a shell bug costs a full provisioning cycle to find.
        run: shellcheck scripts/*.sh .github/workflows/scripts/*.sh
      # Stdlib-only, so there is nothing to install.
      - name: Mempool load harness tests
        if: ${{ !cancelled() }}
        run: python3 .github/workflows/scripts/test_mempool_load.py

      - name: Affected semver package tests
        if: ${{ !cancelled() }}
        run: python3 .github/workflows/scripts/test_affected_semver_packages.py

      - name: Deployer tests
        if: ${{ !cancelled() }}
        run: python3 deploy/deployer/test_deploy.py

      - name: Continuous-sync tests
        if: ${{ !cancelled() }}
        run: python3 deploy/continuous-sync/tests/test_continuous_sync.py

      - name: Ensure no arbitrary or proptest dependency on default build
        if: ${{ !cancelled() }}
        run: cargo +stable tree --package zakura -e=features,no-dev | grep -Eq "arbitrary|proptest" && exit 1 || exit 0

  unused-deps:
    name: unused-deps
    # cargo-udeps needs a clean from-scratch nightly build and is not a
    # correctness gate (unused deps don't break compilation). Run it nightly /
    # on demand only, keeping it off the PR critical path.
    if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'
    permissions:
      contents: read
      id-token: write
      statuses: write
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 #v7.0.1
        with:
          persist-credentials: false
      - uses: actions-rust-lang/setup-rust-toolchain@166cdcfd11aee3cb47222f9ddb555ce30ddb9659 #v1.17.0
        with:
          toolchain: nightly
          cache-on-failure: true
          cache-save-if: ${{ github.ref == 'refs/heads/main' }}
      - uses: taiki-e/install-action@c44f6b046f1c29ae5918b1e0bfdbb2f1813836fd #v2.84.1
        with:
          tool: cargo-udeps
      - uses: ./.github/actions/setup-zakura-build
      - run: cargo udeps --workspace --all-targets --all-features --locked

  # NOTE: the old `features` job (`cargo hack check --all`) is subsumed by the
  # `cargo hack check --workspace` pass in `test-crates.yml`.

  supply-chain:
    name: supply chain
    permissions:
      contents: read
      statuses: write
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 #v7.0.1
        with:
          persist-credentials: false
      - uses: actions-rust-lang/setup-rust-toolchain@166cdcfd11aee3cb47222f9ddb555ce30ddb9659 #v1.17.0
        with:
          # cargo-deny is installed from a prebuilt binary and does not compile
          # workspace crates.
          cache: false
      # Install cargo-deny from a prebuilt binary instead of the EmbarkStudios
      # Docker action: that action rebuilds a container from a Docker Hub base
      # image on every run, which intermittently fails with registry timeouts.
      - uses: taiki-e/install-action@c44f6b046f1c29ae5918b1e0bfdbb2f1813836fd #v2.84.1
        with:
          tool: cargo-deny@0.19.5

      - name: Install cargo-vet
        # v2.84.1 resolves `latest` to cargo-vet 0.10.0, which cannot read
        # trusted-publisher entries generated by cargo-vet 0.10.2.
        uses: taiki-e/install-action@c44f6b046f1c29ae5918b1e0bfdbb2f1813836fd #v2.84.1
        with:
          tool: cargo-vet@0.10.2

      # Disabled features generally cannot add duplicate dependencies or new
      # crate sources, so no-default-features checks are unnecessary here.
      - name: Check default dependency policy
        if: ${{ !cancelled() }}
        run: cargo deny --workspace check bans licenses sources --allow unmatched-skip-root

      # Prevent a newly announced advisory from suddenly failing CI.
      - name: Check default dependency advisories
        if: ${{ !cancelled() }}
        continue-on-error: true
        run: cargo deny --workspace check advisories --allow unmatched-skip-root

      # Advisories and licenses do not need this intermediate feature set:
      # their default and all-features checks cover its dependency graph.
      - name: Check release-feature dependency policy
        if: ${{ !cancelled() }}
        run: cargo deny --workspace --features default-release-binaries check bans sources --allow unmatched-skip-root

      # All features spuriously activate openssl, but production features must
      # still ban it. This variant also produces accurate unmatched skip-root
      # warnings, so the expected openssl ban is allowed only here.
      - name: Check all-feature dependency policy
        if: ${{ !cancelled() }}
        run: cargo deny --workspace --all-features check bans licenses sources --allow banned

      - name: Check all-feature dependency advisories
        if: ${{ !cancelled() }}
        continue-on-error: true
        run: cargo deny --workspace --all-features check advisories --allow banned

      - name: Run cargo-vet check
        if: ${{ !cancelled() }}
        run: cargo vet check

  lint-success:
    name: lint success
    runs-on: ubuntu-latest
    if: always()
    needs:
      - rust-checks
      - msrv
      - docs
      - fast-lints
      - unused-deps
      - supply-chain
    timeout-minutes: 30
    steps:
      - name: Decide whether the needed jobs succeeded or failed
        uses: re-actors/alls-green@05ac9388f0aebcb5727afa17fcccfecd6f8ec5fe #v1.2.2
        with:
          jobs: ${{ toJSON(needs) }}
          # docs and unused-deps run only on the nightly schedule / on demand,
          # so they are skipped (not failed) on the PR and merge paths.
          allowed-skips: docs, unused-deps
