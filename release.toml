# Only allow releases from the main branch
allow-branch = [ 'main' ]

# Workspace crate versions are deliberately independent: a crate is bumped and
# published only when it has changes to publish. Do not configure
# `shared-version` groups.

# Verify releases with release features
#
# TODO: add this feature to all crates
#enable-features = [ 'default-release-binaries' ]

# Don't do a git push or tag
push = false
tag = false

# Owners for new crates
owners = [ 'valardragon', 'p0mvn', 'evan-forbes', 'czarcas7ic', 'ebfull' ]
