name: Zakura E2E

# The Zakura regtest e2e drives a host-networked docker-compose stack and is the
# heaviest, most flake-prone job on the PR path. It lives in its own workflow so
# its run conditions are independent of the broad Rust filter used by the unit
# tests. It runs when:
#   - a pull request touches Zakura-relevant paths, OR carries the
#     `run-zakura-e2e` label (gating is done in the `changes` job below);
#   - a push touches Zakura-relevant paths, for the regular Zakura gate jobs;
#   - every push to `main`, for the block-sync fuzz scenarios;
#   - the change is in the merge queue (`merge_group` ignores path filters), so a
#     change that breaks Zakura sync indirectly is still caught before it lands;
#   - nightly / on demand, for the long four-node modes.
on:
  # No `paths:` filter here on purpose:
  # - PR/push Zakura gating is handled by the `changes` job.
  # - block-sync fuzz must run after every merge to `main`, even when
  #   the merged PR did not touch an obviously Zakura-specific path.
  pull_request:
    branches: [main, "feat/**", "release/**"]
    types: [opened, synchronize, reopened, labeled, unlabeled]

  push:
    branches: [main, "feat/**", "release/**"]

  # Always run in the merge queue, so a change that breaks Zakura sync
  # indirectly is still caught at landing.
  merge_group:

  # Long four-node modes run nightly and on demand.
  schedule:
    - cron: "0 8 * * *"

  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.head_ref || github.run_id }}
  cancel-in-progress: true

permissions:
  contents: read
  pull-requests: read

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1
  RUST_LIB_BACKTRACE: 1
  RUST_LOG: info
  COLORBT_SHOW_HIDDEN: 1

jobs:
  # Decide whether the regular Zakura e2e/testkit gates should run for a pull
  # request or push. PRs can also opt in with the `run-zakura-e2e` label.
  # merge_group / schedule / workflow_dispatch are handled directly in the job
  # `if`s below.
  changes:
    name: detect zakura-relevant changes
    if: github.event_name == 'pull_request' || github.event_name == 'push'
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      contents: read
      pull-requests: read
    outputs:
      zakura: ${{ steps.filter.outputs.zakura }}
    steps:
      - id: filter
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          if [[ "${{ github.event_name }}" == "pull_request" ]]; then
            # The pulls/files API exposes changed paths as `filename` (unlike
            # the compare API's `.files[].filename`, this array is top-level).
            changed=$(gh api --paginate \
              "repos/${{ github.repository }}/pulls/${{ github.event.pull_request.number }}/files" \
              --jq '.[].filename')
          else
            before="${{ github.event.before }}"
            # The first push of a branch (and force-pushes that orphan the old
            # tip) have no usable `before` commit, so the compare would 404;
            # fall back to comparing against the default branch.
            if [[ "$before" == "0000000000000000000000000000000000000000" ]] || \
               ! changed=$(gh api \
                 "repos/${{ github.repository }}/compare/${before}...${{ github.sha }}" \
                 --jq '.files[].filename'); then
              changed=$(gh api \
                "repos/${{ github.repository }}/compare/${{ github.event.repository.default_branch }}...${{ github.sha }}" \
                --jq '.files[].filename')
            fi
          fi

          if printf '%s\n' "$changed" | grep -qE '^(zakura-network/|zakurad/src/components/sync/|zakurad/tests/zakura_regtest_e2e\.rs|docker/zakura-regtest-e2e/|docker/docker-compose\.zakura-regtest-e2e\.yml|\.github/workflows/zakura-e2e\.yml)'; then
            echo "zakura=true" >> "$GITHUB_OUTPUT"
          else
            echo "zakura=false" >> "$GITHUB_OUTPUT"
          fi

  zakura-regtest-e2e-pr-gate:
    name: Zakura regtest e2e (pr-gate)
    needs: [changes]
    # Run in the merge queue, on pushes that touched Zakura paths, and on a pull
    # request when a Zakura path changed or the `run-zakura-e2e` label is present.
    # `always()` keeps this evaluable even though `changes` is skipped for
    # merge_group events.
    if: >-
      always() &&
      (github.event_name == 'merge_group' ||
       (github.event_name == 'push' && needs.changes.outputs.zakura == 'true') ||
       (github.event_name == 'pull_request' &&
        (needs.changes.outputs.zakura == 'true' ||
         contains(github.event.pull_request.labels.*.name, 'run-zakura-e2e'))))
    permissions:
      contents: read
      id-token: write
      statuses: write
    runs-on: ubuntu-latest
    # Observed warm run ~6 min; a cold zakurad debug build is the long pole. This
    # ceiling catches a hung 4-node stack quickly given the e2e's flake history
    # (it is NOT the expected runtime).
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 #v7.0.0
        with:
          persist-credentials: false
      - uses: actions-rust-lang/setup-rust-toolchain@166cdcfd11aee3cb47222f9ddb555ce30ddb9659 #v1.16.1 # zizmor: ignore[cache-poisoning] -- CI e2e job; uploads only diagnostic traces and builds a throwaway debug binary, nothing published/released
        with:
          toolchain: stable
          # The two regtest-e2e jobs share one debug `cargo test --no-run` build
          # (default features, distinct from the `default-release-binaries` group
          # above), so they share a cache with each other but not with that group.
          cache-shared-key: zakura-e2e-debug
          cache-on-failure: true
      - uses: ./.github/actions/setup-zakura-build
      # Compile the e2e once. `cargo test --no-run` builds both the integration
      # test binary and the `zakurad` bin (cargo always builds a package's
      # binaries so its integration tests can find them via CARGO_BIN_EXE_*); the
      # run step below reuses these artifacts instead of recompiling.
      #
      # `setup-zakura-build` exports `ROCKSDB_LIB_DIR`, which makes
      # librocksdb-sys dynamically link the runner's `librocksdb.so`. The harness
      # bind-mounts the `zakurad` bin into a stock `debian:trixie-slim` container
      # that has no system RocksDB, so a dynamically linked bin crashes every
      # node with "librocksdb.so.8.9: cannot open shared object file". Unset it so
      # RocksDB is vendored and statically linked. Both steps must keep it unset:
      # if the run step re-set it, cargo would relink the bin and re-break it.
      - name: Build Zakura e2e (debug)
        run: |
          unset ROCKSDB_LIB_DIR
          cargo test -p zakura --test zakura_regtest_e2e --no-run
        env:
          CXXFLAGS: "-include cstdint"
      - name: Run Zakura regtest PR gate
        run: |
          unset ROCKSDB_LIB_DIR
          cargo test -p zakura --test zakura_regtest_e2e -- --ignored --nocapture
        env:
          CXXFLAGS: "-include cstdint"
          ZAKURA_REGTEST_E2E: "1"
          ZAKURA_E2E_MODE: pr-gate
          ZAKURA_E2E_TRACE_DIR: ${{ runner.temp }}/zakura-regtest-e2e-traces-pr-gate
          ZAKURA_REGTEST_E2E_LABEL: zakura-pr-gate
      - name: Upload Zakura e2e traces
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a #v7.0.1
        with:
          name: zakura-regtest-e2e-pr-gate
          path: ${{ runner.temp }}/zakura-regtest-e2e-traces-pr-gate
          if-no-files-found: ignore

  zakura-testkit:
    name: Zakura testkit cluster integration
    needs: [changes]
    # Keep the slow in-process Zakura cluster tests out of the broad unit lane,
    # but still run them for Zakura-relevant PRs, pushes, the merge queue, and
    # explicit/nightly Zakura coverage.
    if: >-
      always() &&
      (github.event_name == 'merge_group' ||
       (github.event_name == 'push' && needs.changes.outputs.zakura == 'true') ||
       github.event_name == 'schedule' ||
       github.event_name == 'workflow_dispatch' ||
       (github.event_name == 'pull_request' &&
        (needs.changes.outputs.zakura == 'true' ||
         contains(github.event.pull_request.labels.*.name, 'run-zakura-e2e'))))
    permissions:
      contents: read
      id-token: write
      statuses: write
    runs-on: ubuntu-latest
    timeout-minutes: 90
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 #v7.0.0
        with:
          persist-credentials: false
      - uses: actions-rust-lang/setup-rust-toolchain@166cdcfd11aee3cb47222f9ddb555ce30ddb9659 #v1.16.1 # zizmor: ignore[cache-poisoning] -- CI integration job; uploads only diagnostic test traces
        with:
          toolchain: stable
          # Same debug + default-release-binaries workspace build as the unit
          # acceptance jobs, so it shares their consolidated build cache.
          cache-shared-key: zakura-drb-debug
          cache-on-failure: true
      - uses: taiki-e/install-action@43aecc8d72668fbcfe75c31400bc4f890f1c5853 #v2.83.2
        with:
          tool: cargo-nextest
      - uses: ./.github/actions/setup-zakura-build
      - name: Run Zakura testkit cluster profile
        run: cargo nextest run --profile zakura-integration --locked --features default-release-binaries --no-fail-fast
        env:
          ZAKURA_TEST_TRACE: keep
      - name: Upload Zakura testkit traces
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a #v7.0.1
        with:
          name: zakura-testkit-traces
          path: target/zakura-traces
          if-no-files-found: ignore

  zakura-blocksync-fuzz:
    name: Zakura block-sync fuzz scenarios
    # These are long scenario/fuzz-style simulations, not normal PR unit tests.
    # Run them after merges to `main`, nightly, and on demand so
    # regressions are still visible without making every PR wait on the flakiest
    # block-sync scenarios.
    if: >-
      (github.event_name == 'push' && github.ref == 'refs/heads/main') ||
      github.event_name == 'schedule' ||
      github.event_name == 'workflow_dispatch'
    permissions:
      contents: read
      id-token: write
      statuses: write
    runs-on: ubuntu-latest
    timeout-minutes: 90
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 #v7.0.0
        with:
          persist-credentials: false
      - uses: actions-rust-lang/setup-rust-toolchain@166cdcfd11aee3cb47222f9ddb555ce30ddb9659 #v1.16.1 # zizmor: ignore[cache-poisoning] -- CI fuzz-scenario job; uploads only diagnostic test traces
        with:
          toolchain: stable
          cache-shared-key: zakura-drb-debug
          cache-on-failure: true
      - uses: taiki-e/install-action@43aecc8d72668fbcfe75c31400bc4f890f1c5853 #v2.83.2
        with:
          tool: cargo-nextest
      - uses: ./.github/actions/setup-zakura-build
      - name: Run Zakura block-sync fuzz scenarios
        run: cargo nextest run --profile zakura-blocksync-fuzz --locked --features default-release-binaries --no-fail-fast
        env:
          ZAKURA_TEST_TRACE: keep
      - name: Upload Zakura block-sync fuzz traces
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a #v7.0.1
        with:
          name: zakura-blocksync-fuzz-traces
          path: target/zakura-traces
          if-no-files-found: ignore

  zakura-regtest-e2e:
    name: Zakura regtest e2e (${{ matrix.zakura-mode }})
    # The long four-node docker stack runs only on the nightly schedule and on
    # demand. PRs and the merge queue use the trimmed pr-gate job above.
    if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'
    permissions:
      contents: read
      id-token: write
      statuses: write
    runs-on: ubuntu-latest
    timeout-minutes: 240
    strategy:
      fail-fast: false
      matrix:
        zakura-mode:
          - checkpoint-long
          - no-checkpoint-long
          - restart-matrix
          - header-faults
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 #v7.0.0
        with:
          persist-credentials: false
      - uses: actions-rust-lang/setup-rust-toolchain@166cdcfd11aee3cb47222f9ddb555ce30ddb9659 #v1.16.1 # zizmor: ignore[cache-poisoning] -- CI e2e job; uploads only diagnostic traces and builds a throwaway debug binary, nothing published/released
        with:
          toolchain: stable
          cache-shared-key: zakura-e2e-debug
          cache-on-failure: true
      - uses: ./.github/actions/setup-zakura-build
      # Build once (see the pr-gate job for the ROCKSDB_LIB_DIR / static-link
      # rationale); the run step reuses the compiled artifacts.
      - name: Build Zakura e2e (debug)
        run: |
          unset ROCKSDB_LIB_DIR
          cargo test -p zakura --test zakura_regtest_e2e --no-run
        env:
          CXXFLAGS: "-include cstdint"
      - name: Run Zakura regtest dual-stack e2e
        run: |
          unset ROCKSDB_LIB_DIR
          cargo test -p zakura --test zakura_regtest_e2e -- --ignored --nocapture
        env:
          CXXFLAGS: "-include cstdint"
          ZAKURA_REGTEST_E2E: "1"
          ZAKURA_E2E_MODE: ${{ matrix.zakura-mode }}
          ZAKURA_E2E_TRACE_DIR: ${{ runner.temp }}/zakura-regtest-e2e-traces-${{ matrix.zakura-mode }}
          ZAKURA_REGTEST_E2E_LABEL: zakura-${{ matrix.zakura-mode }}
      - name: Upload Zakura e2e traces
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a #v7.0.1
        with:
          name: zakura-regtest-e2e-${{ matrix.zakura-mode }}
          path: ${{ runner.temp }}/zakura-regtest-e2e-traces-${{ matrix.zakura-mode }}
          if-no-files-found: ignore

  zakura-e2e-success:
    name: zakura e2e success
    runs-on: ubuntu-latest
    if: always()
    needs:
      - changes
      - zakura-regtest-e2e-pr-gate
      - zakura-testkit
      - zakura-blocksync-fuzz
      - zakura-regtest-e2e
    timeout-minutes: 30
    steps:
      - name: Decide whether the needed jobs succeeded or failed
        uses: re-actors/alls-green@05ac9388f0aebcb5727afa17fcccfecd6f8ec5fe #v1.2.2
        with:
          jobs: ${{ toJSON(needs) }}
          # `changes` only runs for pull requests and pushes; the e2e lanes are
          # event-scoped (pr-gate/testkit on selected PRs, selected pushes, and
          # queue; fuzz on main pushes/schedule/dispatch; the mode matrix on
          # schedule/dispatch), so whichever doesn't apply is skipped. A genuine
          # failure in any of them still fails this aggregate.
          allowed-skips: changes, zakura-regtest-e2e-pr-gate, zakura-testkit, zakura-blocksync-fuzz, zakura-regtest-e2e
