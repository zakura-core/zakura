# Nextest configuration for Zebra
# This file centralizes all test execution configuration.

[profile.default]
fail-fast = true
status-level = "pass"

# --- Platform-specific overrides ---

# Skip Windows-incompatible tests
[[profile.default.overrides]]
platform = 'cfg(target_os = "windows")'

filter = "not test(=trusted_chain_sync_handles_forks_correctly) and not test(=delete_old_databases)"

[[profile.default.overrides]]
filter = "package(zakura-network) and (test(header_sync_e2e_status_trace_smoke_uses_real_emitted_rows) or test(header_sync_e2e_restart_reloads_durable_tip_and_rebuilds_scheduler))"
threads-required = "num-test-threads"

# --- All Tests profile ---
# CI-friendly test selection.
#
# Runs fast unit/integration tests and explicitly excludes:
# - 'check_no_git_dependencies' (it has its own profile)
# - stateful or long-running tests that require a local cache dir or external
#   services (lightwalletd RPC/GRPC, full sync, checkpoint generation, mining
#   RPCs, etc.).
# - slow or flaky integration-style tests that use subprocesses, wall-clock
#   sleeps, loopback transport, async trace files, or long scenario simulations.
#
# Notes:
# - CI now provides a default cache directory, so stateful tests are no longer
#   auto-skipped when the cache dir is undefined. To keep this profile fast and
#   deterministic, we exclude those tests here and offer dedicated profiles
#   below for running them when needed.
# TODO: We need a better test architecture to run all non-stateful
[profile.all-tests]
failure-output = "immediate"
default-filter = "not test(check_no_git_dependencies) and not test(=fully_synced_rpc_z_getsubtreesbyindex_snapshot_test) and not test(=lwd_rpc_test) and not test(=lwd_rpc_send_tx) and not test(=lwd_grpc_wallet) and not test(=lwd_integration) and not test(=lwd_sync_full) and not test(=lwd_sync_update) and not test(=lightwalletd_test_suite) and not test(=rpc_get_block_template) and not test(=rpc_submit_block) and not test(~generate_checkpoints_) and not test(=sync_one_checkpoint_mainnet) and not test(=sync_one_checkpoint_testnet) and not test(=sync_update_mainnet) and not test(=activate_mempool_mainnet) and not test(=restart_stop_at_height) and not test(=sync_large_checkpoints_mempool_mainnet) and not test(=pruned_storage_mode_prunes_during_regtest_sync) and not test(=config_tests) and not test(~zakura::testkit::cluster) and not test(~zakura::testkit::blocksync_fuzz)"

# The Zakura block-sync tests drive the real reactor through a real-time (wall-clock)
# scenario harness — multi-threaded tokio with real sleeps and timeouts. Under a loaded
# CI runner the whole nextest suite oversubscribes the cores, so a scenario can miss its
# wall-clock deadline even when the logic is correct: a load-induced flake, not a
# regression (a genuine stall fails every attempt). Retry them so a contended miss does
# not fail the run. Mirrors the `zakura-integration` profile, which already retries.
[[profile.all-tests.overrides]]
filter = 'package(zakura-network) and test(~zakura)'
retries = 2

# The `zakura` binary's header/block-sync driver tests (`commands::start::
# zakura_header_sync_driver_tests`) drive the same real-time reactor harness with real
# sleeps and timeouts, so they flake under the same load conditions. The override above
# only matches `zakura-network`, so retry this package's driver tests as well.
[[profile.all-tests.overrides]]
filter = 'package(zakura) and test(~zakura_header_sync_driver_tests)'
retries = 2

# --- Full Tests profile ---
# Broader coverage for `ironwood-main`, scheduled, manual, and merge-queue runs,
# while still keeping the known slow/flaky integration buckets in dedicated
# profiles that can use retries, serial execution, trace artifacts, and
# no-fail-fast without hiding fast unit failures.
[profile.full-tests]
failure-output = "immediate"
default-filter = "not test(check_no_git_dependencies) and not test(=fully_synced_rpc_z_getsubtreesbyindex_snapshot_test) and not test(=lwd_rpc_test) and not test(=lwd_rpc_send_tx) and not test(=lwd_grpc_wallet) and not test(=lwd_integration) and not test(=lwd_sync_full) and not test(=lwd_sync_update) and not test(=lightwalletd_test_suite) and not test(=rpc_get_block_template) and not test(=rpc_submit_block) and not test(~generate_checkpoints_) and not test(=sync_one_checkpoint_mainnet) and not test(=sync_one_checkpoint_testnet) and not test(=sync_update_mainnet) and not test(=activate_mempool_mainnet) and not test(=restart_stop_at_height) and not test(=sync_large_checkpoints_mempool_mainnet) and not test(=config_tests) and not test(~zakura::testkit::cluster) and not test(~zakura::testkit::blocksync_fuzz)"

# Retry the real-time Zakura block-sync scenario tests under load (see the note on the
# `all-tests` override above).
[[profile.full-tests.overrides]]
filter = 'package(zakura-network) and test(~zakura)'
retries = 2

# The `zakura` binary's header/block-sync driver tests flake under the same load (see the
# matching `all-tests` override above).
[[profile.full-tests.overrides]]
filter = 'package(zakura) and test(~zakura_header_sync_driver_tests)'
retries = 2

# --- Individual Test Profiles ---

[profile.check-no-git-dependencies]
default-filter = 'test(check_no_git_dependencies)'

[profile.zakura-config]
test-threads = 1
failure-output = "immediate"
default-filter = 'package(zakura) and test(=config_tests)'

[profile.zakura-network-dependent]
test-threads = 1
retries = 2
slow-timeout = { period = "5m", terminate-after = 1 }
failure-output = "immediate"
default-filter = 'package(zakura) and test(=restart_stop_at_height)'

[profile.zakura-integration]
fail-fast = false
retries = 2
slow-timeout = { period = "15m", terminate-after = 1 }
failure-output = "immediate"
default-filter = 'package(zakura-network) and test(~zakura::testkit::cluster)'

[profile.zakura-blocksync-fuzz]
fail-fast = false
retries = 1
slow-timeout = { period = "15m", terminate-after = 1 }
failure-output = "immediate"
default-filter = 'package(zakura-network) and test(~zakura::testkit::blocksync_fuzz)'


