# This workflow builds and publishes zakurad release assets and Docker images
# when a release tag is pushed. It can also stage verified release assets for
# create-release.yml before the immutable tag exists.
#
# Editing a release's pre-release checkbox on GitHub does not trigger this
# workflow and never rebuilds or re-uploads anything. Real releases get their
# own non-hyphenated tag. To repair or re-upload assets for an existing tag,
# run workflow_dispatch with publish_assets_to_release.
#
# The tag must match the `zakura` package version: release binaries are built
# in Docker without `.git`, so `zakurad --version` reports CARGO_PKG_VERSION,
# and a tag pushed without bumping the package version ships binaries that
# self-report the wrong release (this happened with v1.0.0-rc1). The
# check-release-version job gates every build and publish job on that match;
# run ./scripts/check-release-version.sh before pushing a tag.
name: Release binaries

on:
  push:
    tags:
      - "v*"
  workflow_call:
    inputs:
      release_tag:
        description: "Release tag whose assets are being staged"
        required: true
        type: string
      checkout_ref:
        description: "Exact commit to build before the release tag exists"
        required: true
        type: string
      stage_release_assets:
        description: "Build and attest assets, then upload them as a workflow artifact"
        required: false
        type: boolean
        default: false
  workflow_dispatch:
    inputs:
      release_tag:
        description: "Release tag to build and publish assets for (for example v0.0.1-alpha.1)"
        required: false
        type: string
      publish_assets_to_release:
        description: "Upload zakurad assets to the GitHub release tag (use to repair an existing release)"
        required: false
        type: boolean
        default: false
      publish_docker_to_dockerhub:
        description: "Publish Docker images to Docker Hub"
        required: false
        type: boolean
        default: false
      skip_version_check:
        description: "Skip the tag / zakura package version match check (only for repairing releases tagged with a mismatched version, like v1.0.0-rc1)"
        required: false
        type: boolean
        default: false

permissions:
  contents: read

jobs:
  resolve-release:
    name: Resolve release metadata
    runs-on: ubuntu-latest
    outputs:
      release_tag: ${{ steps.resolve.outputs.release_tag }}
      checkout_ref: ${{ steps.resolve.outputs.checkout_ref }}
      assets_published: ${{ steps.resolve.outputs.assets_published }}
    steps:
      - name: Resolve release tag
        id: resolve
        env:
          REF_NAME: ${{ github.ref_name }}
          REF_TYPE: ${{ github.ref_type }}
          INPUT_RELEASE_TAG: ${{ inputs.release_tag }}
          INPUT_CHECKOUT_REF: ${{ inputs.checkout_ref }}
          GITHUB_SHA: ${{ github.sha }}
          EVENT_NAME: ${{ github.event_name }}
          REPOSITORY: ${{ github.repository }}
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          if [ "$REF_TYPE" = "tag" ]; then
            release_tag="$REF_NAME"
            checkout_ref="$REF_NAME"
          else
            release_tag="$INPUT_RELEASE_TAG"
            # Reusable staging builds pin the validated commit before its tag
            # exists. workflow_dispatch repairs still build from the tag.
            if [ -n "$INPUT_CHECKOUT_REF" ]; then
              checkout_ref="$INPUT_CHECKOUT_REF"
            elif [ -n "$release_tag" ]; then
              checkout_ref="$release_tag"
            else
              checkout_ref="$GITHUB_SHA"
            fi
          fi

          if [ -z "$release_tag" ]; then
            echo "A release tag is required. Set workflow_dispatch input release_tag." >&2
            exit 1
          fi

          echo "release_tag=$release_tag" >> "$GITHUB_OUTPUT"
          echo "checkout_ref=$checkout_ref" >> "$GITHUB_OUTPUT"

          assets_published=false
          # A tag created by create-release.yml already has its complete asset
          # set. Skip rebuilding only for tag-push runs; manual repair runs must
          # continue to rebuild and replace assets.
          if [ "$EVENT_NAME" = "push" ] && [ "$REF_TYPE" = "tag" ]; then
            for attempt in 1 2 3 4 5 6; do
              release_json="$(
                gh api "repos/${REPOSITORY}/releases/tags/${release_tag}" \
                  2>/dev/null || true
              )"
              has_complete_assets="$(
                echo "$release_json" | jq -r --arg tag "$release_tag" '
                  [.assets[].name] as $names
                  | [
                      "SHA256SUMS.txt",
                      "install-zakura.sh",
                      ("zakurad-" + $tag + "-linux-aarch64.tar.gz"),
                      ("zakurad-" + $tag + "-linux-x86_64.tar.gz"),
                      ("zakurad-manifest-" + $tag + ".json")
                    ] as $required
                  | (($required - $names) | length) == 0
                ' 2>/dev/null || true
              )"
              if [ "$has_complete_assets" = "true" ]; then
                assets_published=true
                break
              fi
              if [ "$attempt" -lt 6 ]; then
                echo "Waiting for published release assets (attempt ${attempt}/6)."
                sleep 5
              fi
            done
          fi
          echo "assets_published=$assets_published" >> "$GITHUB_OUTPUT"

  check-release-version:
    name: Check release tag matches package version
    runs-on: ubuntu-latest
    needs: [resolve-release]
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd #v6.0.2
        with:
          persist-credentials: false
          ref: ${{ needs.resolve-release.outputs.checkout_ref }}

      # Tag pushes cannot set inputs, so the check always runs for new tags;
      # skip_version_check only unblocks workflow_dispatch repairs of releases
      # that were tagged with a mismatched version before this gate existed.
      - name: Check the zakura package version matches the release tag
        if: ${{ !inputs.skip_version_check }}
        env:
          RELEASE_TAG: ${{ needs.resolve-release.outputs.release_tag }}
        run: ./scripts/check-release-version.sh "$RELEASE_TAG"

  resolve-zcashd-compat-manifest:
    name: Resolve zcashd compat manifest
    runs-on: ubuntu-latest
    needs: [resolve-release]
    outputs:
      manifest_path: ${{ steps.resolve.outputs.manifest_path }}
      release_tag: ${{ steps.resolve.outputs.release_tag }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd #v6.0.2
        with:
          persist-credentials: false
          ref: ${{ needs.resolve-release.outputs.checkout_ref }}

      - name: Resolve and parse manifest
        id: resolve
        run: |
          set -euo pipefail
          ./scripts/resolve-zcashd-compat-manifest.sh \
            --write-github-output \
            --require-targets x86_64-pc-linux-gnu

  build-zakurad-assets:
    name: Build zakurad assets (${{ matrix.name }})
    runs-on: ${{ matrix.runner }}
    needs: [resolve-release, check-release-version]
    if: needs.resolve-release.outputs.assets_published != 'true'
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: linux-x86_64
            runner: ${{ vars.DOCKER_BUILD_RUNNER_AMD64 || 'ubuntu-latest' }}
            platform: linux/amd64
            target_triple: x86_64-unknown-linux-gnu
          - name: linux-aarch64
            runner: ${{ vars.DOCKER_BUILD_RUNNER_ARM64 || 'ubuntu-24.04-arm' }}
            platform: linux/arm64
            target_triple: aarch64-unknown-linux-gnu
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd #v6.0.2
        with:
          persist-credentials: false
          ref: ${{ needs.resolve-release.outputs.checkout_ref }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@4d04d5d9486b7bd6fa91e7baf45bbb4f8b9deedd #v4.0.0 # zizmor: ignore[cache-poisoning] -- shared Docker Build Cloud cache across envs, isolation fix pending
        with:
          version: lab:latest
          driver: docker

      - name: Build release binary
        env:
          FEATURES: ${{ vars.RUST_PROD_FEATURES || 'default-release-binaries' }}
        run: |
          set -euo pipefail
          mkdir -p ./out
          short_sha="$(git rev-parse --short=12 HEAD)"
          docker buildx build \
            --platform "${{ matrix.platform }}" \
            --target release \
            --file ./docker/Dockerfile \
            --build-arg "FEATURES=${FEATURES}" \
            --build-arg "SHORT_SHA=${short_sha}" \
            --output "type=local,dest=./out" \
            .
          if [ -x ./out/usr/local/bin/zakurad ]; then
            echo "release_binary=zakurad" >> "$GITHUB_ENV"
          else
            echo "Expected ./out/usr/local/bin/zakurad" >&2
            exit 1
          fi

      - name: Validate binary
        env:
          RELEASE_TAG: ${{ needs.resolve-release.outputs.release_tag }}
          SKIP_VERSION_CHECK: ${{ inputs.skip_version_check }}
        run: |
          set -euo pipefail
          version_output="$(./out/usr/local/bin/${{ env.release_binary }} --version)"
          echo "$version_output"

          if [ "$SKIP_VERSION_CHECK" = "true" ]; then
            echo "Skipping binary version check (skip_version_check input set)."
            exit 0
          fi

          # Docker builds have no .git, so the binary reports
          # CARGO_PKG_VERSION plus "+g<commit>" build metadata; the release
          # version must match the tag exactly.
          binary_version="$(printf '%s\n' "$version_output" | head -n1)"
          binary_version="${binary_version##* }"
          binary_version="${binary_version%%+*}"
          tag_version="${RELEASE_TAG#v}"
          if [ "$binary_version" != "$tag_version" ]; then
            echo "Binary self-reports version ${binary_version}, but the release tag is ${RELEASE_TAG}." >&2
            echo "Bump the zakura package version on the release branch before tagging." >&2
            exit 1
          fi

      - name: Package archive and metadata
        env:
          RELEASE_TAG: ${{ needs.resolve-release.outputs.release_tag }}
          RELEASE_BINARY: ${{ env.release_binary }}
        run: |
          set -euo pipefail
          mkdir -p ./artifacts/bin ./artifacts/metadata
          cp "./out/usr/local/bin/${RELEASE_BINARY}" ./artifacts/bin/zakurad
          archive_name="zakurad-${RELEASE_TAG}-${{ matrix.name }}.tar.gz"
          (
            cd ./artifacts
            tar --sort=name \
              --mtime='UTC 2020-01-01' \
              --owner=0 --group=0 --numeric-owner \
              -czf "$archive_name" ./bin/zakurad
          )
          archive_sha256="$(sha256sum "./artifacts/${archive_name}" | awk '{print $1}')"
          archive_size="$(stat --printf='%s' "./artifacts/${archive_name}")"
          cat > "./artifacts/metadata/${{ matrix.name }}.metadata.json" <<EOF
          {
            "platform_id": "${{ matrix.name }}",
            "target_triple": "${{ matrix.target_triple }}",
            "archive": "${archive_name}",
            "sha256": "${archive_sha256}",
            "size": ${archive_size},
            "archive_member_binary_path": "./bin/zakurad"
          }
          EOF

      - name: Upload matrix artifacts
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a #v7.0.1
        with:
          name: zakurad-assets-${{ matrix.name }}
          path: ./artifacts

  publish-zakurad-assets:
    name: Assemble zakurad assets
    needs: [resolve-release, build-zakurad-assets]
    runs-on: ubuntu-latest
    permissions:
      contents: write
      id-token: write
      attestations: write
    if: >-
      ${{
        inputs.stage_release_assets
        || (
          needs.resolve-release.outputs.assets_published != 'true'
          && (startsWith(github.ref, 'refs/tags/v') || inputs.publish_assets_to_release)
        )
      }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd #v6.0.2
        with:
          persist-credentials: false
          ref: ${{ needs.resolve-release.outputs.checkout_ref }}

      - name: Download built artifacts
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c #v8.0.1
        with:
          path: ./publish
          pattern: zakurad-assets-*
          merge-multiple: true

      - name: Build manifest and checksums
        env:
          RELEASE_TAG: ${{ needs.resolve-release.outputs.release_tag }}
          REPOSITORY: ${{ github.repository }}
        run: |
          set -euo pipefail
          mkdir -p ./publish/final
          RELEASE_TAG="$RELEASE_TAG" REPOSITORY="$REPOSITORY" python3 - <<'PY'
          import glob
          import json
          import os
          from pathlib import Path

          release_tag = os.environ["RELEASE_TAG"]
          repository = os.environ["REPOSITORY"]
          base_url = f"https://github.com/{repository}/releases/download/{release_tag}"
          metadata_files = sorted(glob.glob("./publish/**/*.metadata.json", recursive=True))
          if not metadata_files:
              raise SystemExit("No metadata files found.")

          artifacts = []
          x86_sha256 = ""
          for file_path in metadata_files:
              item = json.loads(Path(file_path).read_text(encoding="utf-8"))
              item["url"] = f"{base_url}/{item['archive']}"
              artifacts.append(item)
              if item.get("platform_id") == "linux-x86_64":
                  x86_sha256 = item.get("sha256", "")

          manifest = {
              "schema_version": 1,
              "release_tag": release_tag,
              "repository": repository,
              "artifacts": artifacts,
          }
          Path("./publish/final").mkdir(parents=True, exist_ok=True)
          Path(f"./publish/final/zakurad-manifest-{release_tag}.json").write_text(
              json.dumps(manifest, indent=2, sort_keys=True) + "\n",
              encoding="utf-8",
          )
          if not x86_sha256:
              raise SystemExit("Missing linux-x86_64 archive sha256 in metadata.")
          Path("./publish/final/x86_64.sha256").write_text(x86_sha256 + "\n", encoding="utf-8")
          PY

          find ./publish -type f -name 'zakurad-*.tar.gz' -exec cp {} ./publish/final/ \;
          cp ./scripts/install-zakura.sh ./publish/final/
          RELEASE_TAG="$RELEASE_TAG" python3 - <<'PY'
          import os
          import re
          from pathlib import Path

          release_tag = os.environ["RELEASE_TAG"]
          image_version = release_tag.removeprefix("v")
          x86_sha256 = Path("./publish/final/x86_64.sha256").read_text(encoding="utf-8").strip()
          installers = {
              "install-zakura.sh": {
                  "ZAKURA_RELEASE_TAG": release_tag,
                  "ZAKURA_ARCHIVE_SHA256": x86_sha256,
                  "ZAKURA_DOCKER_IMAGE": f"valargroup/zakura:{image_version}",
                  "ZAKURA_COMPAT_DOCKER_IMAGE": f"valargroup/zakura:zcashd-compat-{image_version}",
              },
          }
          for filename, replacements in installers.items():
              installer_path = Path("./publish/final") / filename
              installer = installer_path.read_text(encoding="utf-8")
              for name, value in replacements.items():
                  installer, count = re.subn(
                      rf'^{name}="[^"]*"$',
                      f'{name}="{value}"',
                      installer,
                      count=1,
                      flags=re.MULTILINE,
                  )
                  if count != 1:
                      raise SystemExit(f"Expected exactly one {name} assignment in {filename}.")
              installer_path.write_text(installer, encoding="utf-8")
          PY
          (
            cd ./publish/final
            # x86_64.sha256 is an intermediate used to pin the installer above;
            # it is not uploaded to the release, so keep it out of the signed
            # checksums file.
            rm -f SHA256SUMS.txt x86_64.sha256
            sha256sum ./* > ../SHA256SUMS.txt
            mv ../SHA256SUMS.txt SHA256SUMS.txt
          )

      - name: Attest build provenance
        uses: actions/attest-build-provenance@0f67c3f4856b2e3261c31976d6725780e5e4c373 #v4.1.1
        with:
          subject-path: |
            ./publish/final/zakurad-*.tar.gz
            ./publish/final/zakurad-manifest-*.json
            ./publish/final/install-zakura.sh
            ./publish/final/SHA256SUMS.txt

      - name: Ensure release exists
        if: ${{ !inputs.stage_release_assets }}
        env:
          EVENT_NAME: ${{ github.event_name }}
          REF_TYPE: ${{ github.ref_type }}
          GH_TOKEN: ${{ github.token }}
          REPOSITORY: ${{ github.repository }}
          RELEASE_TAG: ${{ needs.resolve-release.outputs.release_tag }}
          TARGET_REF: ${{ needs.resolve-release.outputs.checkout_ref }}
        run: |
          set -euo pipefail
          if gh release view "$RELEASE_TAG" --repo "$REPOSITORY" >/dev/null 2>&1; then
            exit 0
          fi

          if [ "$EVENT_NAME" != "workflow_dispatch" ] && [ "$REF_TYPE" != "tag" ]; then
            echo "Release $RELEASE_TAG does not exist." >&2
            exit 1
          fi

          release_flags=()
          release_notes="Release created by release-binaries."
          if [ "$EVENT_NAME" = "workflow_dispatch" ]; then
            release_flags+=(--draft --prerelease)
            release_notes="Temporary release created by release-binaries workflow_dispatch."
          elif [[ "$RELEASE_TAG" == *-* ]]; then
            release_flags+=(--prerelease)
          fi

          target_commitish="$(git rev-parse --verify "${TARGET_REF}^{commit}")"
          gh release create "$RELEASE_TAG" \
            --repo "$REPOSITORY" \
            --target "$target_commitish" \
            --title "$RELEASE_TAG" \
            --notes "$release_notes" \
            "${release_flags[@]}"

      - name: Upload assets to release
        if: ${{ !inputs.stage_release_assets }}
        env:
          GH_TOKEN: ${{ github.token }}
          REPOSITORY: ${{ github.repository }}
          RELEASE_TAG: ${{ needs.resolve-release.outputs.release_tag }}
        run: |
          set -euo pipefail
          # Drop stale pre-rename assets so installers only see zakurad archives.
          legacy_assets=(
            "zebrad-${RELEASE_TAG}-linux-x86_64.tar.gz"
            "zebrad-${RELEASE_TAG}-linux-aarch64.tar.gz"
            "zebrad-manifest-${RELEASE_TAG}.json"
          )
          for asset in "${legacy_assets[@]}"; do
            gh release delete-asset "$RELEASE_TAG" "$asset" --repo "$REPOSITORY" --yes 2>/dev/null || true
          done

          gh release upload "$RELEASE_TAG" \
            ./publish/final/zakurad-*.tar.gz \
            ./publish/final/zakurad-manifest-*.json \
            ./publish/final/install-zakura.sh \
            ./publish/final/SHA256SUMS.txt \
            --repo "$REPOSITORY" \
            --clobber

      - name: Upload staged release assets
        if: ${{ inputs.stage_release_assets }}
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a #v7.0.1
        with:
          name: staged-release-assets
          path: ./publish/final
          if-no-files-found: error
          # Staged assets must outlive a pending release environment approval.
          retention-days: 3

  update-source-installer:
    name: Update source installer metadata
    needs: [resolve-release, publish-zakurad-assets]
    runs-on: ubuntu-latest
    environment: release-automation
    permissions:
      contents: read
    if: >-
      ${{
        !cancelled()
        && needs.resolve-release.result == 'success'
        && (
          needs.publish-zakurad-assets.result == 'success'
          || needs.resolve-release.outputs.assets_published == 'true'
        )
        && (startsWith(github.ref, 'refs/tags/v') || inputs.publish_assets_to_release)
      }}
    steps:
      - name: Download published installer
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_TAG: ${{ needs.resolve-release.outputs.release_tag }}
          REPOSITORY: ${{ github.repository }}
        run: |
          set -euo pipefail
          mkdir -p ./publish/final
          gh release download "$RELEASE_TAG" \
            --repo "$REPOSITORY" \
            --pattern install-zakura.sh \
            --dir ./publish/final

      - name: Create release GitHub App token
        id: app-token
        uses: actions/create-github-app-token@bcd2ba49218906704ab6c1aa796996da409d3eb1 #v3.2.0
        with:
          client-id: ${{ vars.RELEASE_APP_CLIENT_ID }}
          private-key: ${{ secrets.RELEASE_APP_PRIVATE_KEY }}
          permission-contents: write
          permission-pull-requests: write

      - name: Checkout main for installer metadata update
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd #v6.0.2
        with:
          token: ${{ steps.app-token.outputs.token }}
          persist-credentials: true
          ref: main
          path: source-update

      - name: Resolve release GitHub App user
        id: app-user
        env:
          APP_SLUG: ${{ steps.app-token.outputs.app-slug }}
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
        run: echo "id=$(gh api "/users/${APP_SLUG}[bot]" --jq .id)" >> "$GITHUB_OUTPUT"

      - name: Update source installer metadata
        id: source-installer
        env:
          RELEASE_TAG: ${{ needs.resolve-release.outputs.release_tag }}
        run: |
          set -euo pipefail
          RELEASE_TAG="$RELEASE_TAG" python3 - <<'PY'
          import os
          import re
          import tomllib
          from pathlib import Path

          release_tag = os.environ["RELEASE_TAG"]
          generated_path = Path("./publish/final/install-zakura.sh")
          source_path = Path("./source-update/scripts/install-zakura.sh")
          manifest_path = Path("./source-update/zakurad/Cargo.toml")
          generated = generated_path.read_text(encoding="utf-8")
          source = source_path.read_text(encoding="utf-8")
          package_version = tomllib.loads(
              manifest_path.read_text(encoding="utf-8")
          )["package"]["version"]

          def assignment(contents: str, name: str) -> str:
              match = re.search(rf'^{name}="([^"]*)"$', contents, flags=re.MULTILINE)
              if not match:
                  raise SystemExit(f"Missing {name} assignment.")
              return match.group(1)

          generated_tag = assignment(generated, "ZAKURA_RELEASE_TAG")
          generated_sha256 = assignment(generated, "ZAKURA_ARCHIVE_SHA256")

          if generated_tag != release_tag:
              raise SystemExit(
                  f"Generated installer tag {generated_tag} does not match {release_tag}."
              )
          if not re.fullmatch(r"[0-9a-f]{64}", generated_sha256) or set(generated_sha256) == {"0"}:
              raise SystemExit("Generated installer does not contain a valid archive checksum.")
          if f"v{package_version}" != release_tag:
              print(
                  f"main package version is v{package_version}, not {release_tag}; "
                  "skipping the stale release metadata update."
              )
              with Path(os.environ["GITHUB_OUTPUT"]).open("a", encoding="utf-8") as output:
                  output.write("changed=false\n")
              raise SystemExit(0)

          updated = source
          for name in (
              "ZAKURA_RELEASE_TAG",
              "ZAKURA_ARCHIVE_SHA256",
              "ZAKURA_DOCKER_IMAGE",
              "ZAKURA_COMPAT_DOCKER_IMAGE",
          ):
              value = assignment(generated, name)
              updated, count = re.subn(
                  rf'^{name}="[^"]*"$',
                  f'{name}="{value}"',
                  updated,
                  count=1,
                  flags=re.MULTILINE,
              )
              if count != 1:
                  raise SystemExit(f"Expected exactly one {name} assignment.")

          source_path.write_text(updated, encoding="utf-8")
          with Path(os.environ["GITHUB_OUTPUT"]).open("a", encoding="utf-8") as output:
              output.write(f"changed={'true' if updated != source else 'false'}\n")
              output.write(f"sha256={generated_sha256}\n")
          PY

      - name: Open installer metadata update PR
        if: steps.source-installer.outputs.changed == 'true'
        env:
          APP_ID: ${{ steps.app-user.outputs.id }}
          APP_SLUG: ${{ steps.app-token.outputs.app-slug }}
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
          RELEASE_TAG: ${{ needs.resolve-release.outputs.release_tag }}
          REPOSITORY: ${{ github.repository }}
          SHA256: ${{ steps.source-installer.outputs.sha256 }}
        working-directory: source-update
        run: |
          set -euo pipefail
          branch="automation/update-installer-${RELEASE_TAG}"
          existing_pr="$(
            gh pr list \
              --repo "$REPOSITORY" \
              --head "$branch" \
              --state open \
              --json number \
              --jq '.[0].number // empty'
          )"
          if [ -n "$existing_pr" ]; then
            existing_installer="${RUNNER_TEMP}/existing-install-zakura.sh"
            gh api \
              "repos/${REPOSITORY}/contents/scripts/install-zakura.sh?ref=${branch}" \
              --jq .content \
            | base64 --decode > "$existing_installer"
            EXPECTED_INSTALLER="scripts/install-zakura.sh" \
              EXISTING_INSTALLER="$existing_installer" \
              python3 - <<'PY'
          import os
          import re
          from pathlib import Path

          expected = Path(os.environ["EXPECTED_INSTALLER"]).read_text(encoding="utf-8")
          existing = Path(os.environ["EXISTING_INSTALLER"]).read_text(encoding="utf-8")
          names = (
              "ZAKURA_RELEASE_TAG",
              "ZAKURA_ARCHIVE_SHA256",
              "ZAKURA_DOCKER_IMAGE",
              "ZAKURA_COMPAT_DOCKER_IMAGE",
          )
          for name in names:
              pattern = rf'^{name}="[^"]*"$'
              expected_match = re.search(pattern, expected, flags=re.MULTILINE)
              existing_match = re.search(pattern, existing, flags=re.MULTILINE)
              if expected_match is None or existing_match is None:
                  raise SystemExit(f"Missing {name} in an installer.")
              if existing_match.group(0) != expected_match.group(0):
                  raise SystemExit(
                      f"Installer metadata PR contains a stale {name}; update it before retrying."
                  )
          PY
            echo "Installer metadata PR #${existing_pr} is already current."
            exit 0
          fi

          if git ls-remote --exit-code --heads origin "$branch" >/dev/null 2>&1; then
            branch="${branch}-${GITHUB_RUN_ID}-${GITHUB_RUN_ATTEMPT}"
          fi

          git switch -c "$branch"
          git add scripts/install-zakura.sh
          git -c user.name="${APP_SLUG}[bot]" \
            -c user.email="${APP_ID}+${APP_SLUG}[bot]@users.noreply.github.com" \
            commit -m "chore(release): update installer metadata for ${RELEASE_TAG}"
          git push --set-upstream origin "$branch"

          gh pr create \
            --repo "$REPOSITORY" \
            --base main \
            --head "$branch" \
            --title "chore(release): update installer metadata for ${RELEASE_TAG}" \
            --body "$(cat <<EOF
          ## Motivation

          Keep the installer served from \`main\` pinned to the release artifacts published for ${RELEASE_TAG}.

          ## Solution

          Update the installer release tag, Docker image tags, and
          \`ZAKURA_ARCHIVE_SHA256\` calculated by the release workflow:
          \`${SHA256}\`

          ### Tests

          - The release workflow built the archive and calculated this checksum.
          - The published installer was generated with the same checksum.

          ### AI Disclosure

          - [x] No AI tools were used in this automatically generated PR.

          ### PR Checklist

          - [x] The PR title follows conventional commits format.
          - [x] The change is limited to generated release metadata.
          - [x] The solution is validated by the release workflow.
          - [x] Documentation and changelogs do not require changes.
          EOF
          )"

  build:
    name: Build Release Docker (${{ matrix.name }})
    needs: [resolve-release, check-release-version]
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: linux-x86_64
            runner: ${{ vars.DOCKER_BUILD_RUNNER_AMD64 || 'ubuntu-latest' }}
            platform: linux/amd64
            docker_tag_suffix: amd64
          - name: linux-aarch64
            runner: ${{ vars.DOCKER_BUILD_RUNNER_ARM64 || 'ubuntu-24.04-arm' }}
            platform: linux/arm64
            docker_tag_suffix: arm64
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd #v6.0.2
        with:
          persist-credentials: false
          ref: ${{ needs.resolve-release.outputs.checkout_ref }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@4d04d5d9486b7bd6fa91e7baf45bbb4f8b9deedd #v4.0.0 # zizmor: ignore[cache-poisoning] -- shared Docker Build Cloud cache across envs, isolation fix pending
        with:
          version: lab:latest
          driver: docker

      - name: Login to DockerHub
        if: startsWith(github.ref, 'refs/tags/v') || inputs.publish_docker_to_dockerhub
        uses: docker/login-action@4907a6ddec9925e35a0a9e82d7399ccc52663121 #v4.1.0
        with:
          username: valargroup
          password: ${{ secrets.DOCKERHUB_TOKEN_VALARGROUP }}

      - name: Build runtime image
        if: ${{ !startsWith(github.ref, 'refs/tags/v') && !inputs.publish_docker_to_dockerhub }}
        env:
          FEATURES: ${{ vars.RUST_PROD_FEATURES || 'default-release-binaries' }}
          IMAGE_TAG: valargroup/zakura:release-ci-${{ matrix.name }}
        run: |
          set -euo pipefail
          short_sha="$(git rev-parse --short=12 HEAD)"
          image_version="${{ needs.resolve-release.outputs.release_tag }}"
          image_version="${image_version#v}"
          docker buildx build \
            --platform "${{ matrix.platform }}" \
            --target runtime \
            --file ./docker/Dockerfile \
            --build-arg "FEATURES=${FEATURES}" \
            --build-arg "SHORT_SHA=${short_sha}" \
            --build-arg "IMAGE_VERSION=${image_version}" \
            --tag "$IMAGE_TAG" \
            --load \
            .
          docker image inspect "$IMAGE_TAG" >/dev/null

      - name: Build and push runtime image
        if: startsWith(github.ref, 'refs/tags/v') || inputs.publish_docker_to_dockerhub
        env:
          FEATURES: ${{ vars.RUST_PROD_FEATURES || 'default-release-binaries' }}
          RELEASE_TAG: ${{ needs.resolve-release.outputs.release_tag }}
          DOCKER_TAG_SUFFIX: ${{ matrix.docker_tag_suffix }}
        run: |
          set -euo pipefail
          image_version="${RELEASE_TAG#v}"
          short_sha="$(git rev-parse --short=12 HEAD)"
          docker buildx build \
            --platform "${{ matrix.platform }}" \
            --target runtime \
            --file ./docker/Dockerfile \
            --build-arg "FEATURES=${FEATURES}" \
            --build-arg "SHORT_SHA=${short_sha}" \
            --build-arg "IMAGE_VERSION=${image_version}" \
            --tag "valargroup/zakura:${image_version}-${DOCKER_TAG_SUFFIX}" \
            --push \
            .

  publish-docker-manifest:
    name: Publish Docker multi-arch manifest
    if: startsWith(github.ref, 'refs/tags/v') || inputs.publish_docker_to_dockerhub
    runs-on: ubuntu-latest
    needs: [resolve-release, build]
    steps:
      - name: Login to DockerHub
        uses: docker/login-action@4907a6ddec9925e35a0a9e82d7399ccc52663121 #v4.1.0
        with:
          username: valargroup
          password: ${{ secrets.DOCKERHUB_TOKEN_VALARGROUP }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@4d04d5d9486b7bd6fa91e7baf45bbb4f8b9deedd #v4.0.0

      - name: Create and verify Docker manifest
        env:
          RELEASE_TAG: ${{ needs.resolve-release.outputs.release_tag }}
        run: |
          set -euo pipefail
          image_version="${RELEASE_TAG#v}"
          tags=(-t "valargroup/zakura:${image_version}")
          # Only full releases (no hyphen in the tag) move :latest;
          # pre-release tags like v1.0.0-rc0 never touch it.
          if [[ "$RELEASE_TAG" != *-* ]]; then
            tags+=(-t "valargroup/zakura:latest")
          fi

          docker buildx imagetools create \
            "${tags[@]}" \
            "valargroup/zakura:${image_version}-amd64" \
            "valargroup/zakura:${image_version}-arm64"

          docker buildx imagetools inspect "valargroup/zakura:${image_version}" \
            --format '{{json .Manifest}}' \
            | jq -e '
                [ .manifests[].platform | "\(.os)/\(.architecture)" ] as $platforms
                | ($platforms | index("linux/amd64")) != null and ($platforms | index("linux/arm64")) != null
              ' >/dev/null

  build-zcashd-compat:
    name: Build Release Docker zcashd Compat (${{ matrix.name }})
    runs-on: ${{ matrix.runner }}
    needs: [resolve-release, resolve-zcashd-compat-manifest, check-release-version]
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: linux-x86_64
            runner: ${{ vars.DOCKER_BUILD_RUNNER_AMD64 || 'ubuntu-latest' }}
            platform: linux/amd64
            docker_tag_suffix: amd64
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd #v6.0.2
        with:
          persist-credentials: false
          ref: ${{ needs.resolve-release.outputs.checkout_ref }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@4d04d5d9486b7bd6fa91e7baf45bbb4f8b9deedd #v4.0.0 # zizmor: ignore[cache-poisoning] -- shared Docker Build Cloud cache across envs, isolation fix pending
        with:
          version: lab:latest
          driver: docker

      - name: Login to DockerHub
        if: startsWith(github.ref, 'refs/tags/v') || inputs.publish_docker_to_dockerhub
        uses: docker/login-action@4907a6ddec9925e35a0a9e82d7399ccc52663121 #v4.1.0
        with:
          username: valargroup
          password: ${{ secrets.DOCKERHUB_TOKEN_VALARGROUP }}

      - name: Prepare zcashd compat build context
        env:
          DOCKER_PLATFORM: ${{ matrix.platform }}
        run: |
          set -euo pipefail
          ./scripts/resolve-zcashd-compat-manifest.sh \
            --prepare-build-context "${RUNNER_TEMP}/zcashd-compat-context" \
            --platform "$DOCKER_PLATFORM"

      - name: Build zcashd compat runtime image
        if: ${{ !startsWith(github.ref, 'refs/tags/v') && !inputs.publish_docker_to_dockerhub }}
        env:
          FEATURES: ${{ vars.RUST_PROD_FEATURES || 'default-release-binaries' }}
          IMAGE_TAG: valargroup/zakura:zcashd-compat-release-ci-${{ matrix.name }}
        run: |
          set -euo pipefail
          short_sha="$(git rev-parse --short=12 HEAD)"
          image_version="${{ needs.resolve-release.outputs.release_tag }}"
          image_version="${image_version#v}"
          docker buildx build \
            --platform "${{ matrix.platform }}" \
            --target runtime-zcashd-compat \
            --file ./docker/Dockerfile \
            --build-context "zcashd_compat=${RUNNER_TEMP}/zcashd-compat-context" \
            --build-arg "FEATURES=${FEATURES}" \
            --build-arg "SHORT_SHA=${short_sha}" \
            --build-arg "IMAGE_VERSION=${image_version}" \
            --tag "$IMAGE_TAG" \
            --load \
            .
          docker image inspect "$IMAGE_TAG" >/dev/null

      - name: Build and push zcashd compat runtime image
        if: startsWith(github.ref, 'refs/tags/v') || inputs.publish_docker_to_dockerhub
        env:
          FEATURES: ${{ vars.RUST_PROD_FEATURES || 'default-release-binaries' }}
          RELEASE_TAG: ${{ needs.resolve-release.outputs.release_tag }}
          DOCKER_TAG_SUFFIX: ${{ matrix.docker_tag_suffix }}
        run: |
          set -euo pipefail
          image_version="${RELEASE_TAG#v}"
          short_sha="$(git rev-parse --short=12 HEAD)"
          docker buildx build \
            --platform "${{ matrix.platform }}" \
            --target runtime-zcashd-compat \
            --file ./docker/Dockerfile \
            --build-context "zcashd_compat=${RUNNER_TEMP}/zcashd-compat-context" \
            --build-arg "FEATURES=${FEATURES}" \
            --build-arg "SHORT_SHA=${short_sha}" \
            --build-arg "IMAGE_VERSION=${image_version}" \
            --tag "valargroup/zakura:zcashd-compat-${image_version}-${DOCKER_TAG_SUFFIX}" \
            --push \
            .

  publish-zcashd-compat-docker-manifest:
    name: Publish zcashd compat Docker amd64 manifest
    if: startsWith(github.ref, 'refs/tags/v') || inputs.publish_docker_to_dockerhub
    runs-on: ubuntu-latest
    needs: [resolve-release, resolve-zcashd-compat-manifest, build-zcashd-compat]
    steps:
      - name: Login to DockerHub
        uses: docker/login-action@4907a6ddec9925e35a0a9e82d7399ccc52663121 #v4.1.0
        with:
          username: valargroup
          password: ${{ secrets.DOCKERHUB_TOKEN_VALARGROUP }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@4d04d5d9486b7bd6fa91e7baf45bbb4f8b9deedd #v4.0.0

      - name: Create and verify zcashd compat Docker manifest
        env:
          RELEASE_TAG: ${{ needs.resolve-release.outputs.release_tag }}
        run: |
          set -euo pipefail
          image_version="${RELEASE_TAG#v}"
          tags=(-t "valargroup/zakura:zcashd-compat-${image_version}")
          # Only full releases (no hyphen in the tag) move :latest;
          # pre-release tags like v1.0.0-rc0 never touch it.
          if [[ "$RELEASE_TAG" != *-* ]]; then
            tags+=(-t "valargroup/zakura:zcashd-compat-latest")
          fi

          docker buildx imagetools create \
            "${tags[@]}" \
            "valargroup/zakura:zcashd-compat-${image_version}-amd64"

          docker buildx imagetools inspect "valargroup/zakura:zcashd-compat-${image_version}" \
            --format '{{json .Manifest}}' \
            | jq -e '
                [ .manifests[].platform | "\(.os)/\(.architecture)" ] as $platforms
                | $platforms == ["linux/amd64"]
              ' >/dev/null

  release-binaries-success:
    name: Release binaries success
    runs-on: ubuntu-latest
    if: always()
    needs:
      - resolve-release
      - check-release-version
      - resolve-zcashd-compat-manifest
      - build-zakurad-assets
      - publish-zakurad-assets
      - update-source-installer
      - build
      - publish-docker-manifest
      - build-zcashd-compat
      - publish-zcashd-compat-docker-manifest
    timeout-minutes: 1
    steps:
      - name: Decide whether the needed jobs succeeded or failed
        uses: re-actors/alls-green@05ac9388f0aebcb5727afa17fcccfecd6f8ec5fe #v1.2.2
        with:
          jobs: ${{ toJSON(needs) }}
          allowed-skips: build-zakurad-assets,publish-zakurad-assets,update-source-installer,publish-docker-manifest,publish-zcashd-compat-docker-manifest
