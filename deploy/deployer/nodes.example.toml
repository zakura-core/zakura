# Example node fleet config for deploy/deployer/deploy.py.
#
# Copy to nodes.toml and edit. Per-node values override [defaults].
# Run: python3 deploy.py deploy --config nodes.toml

[defaults]
service_name    = "zakurad"                 # systemd unit name on the node
bin_path        = "/usr/local/bin/zakurad"
config_path     = "/etc/zakura/zakura.toml"
log_file        = "/var/log/zakura/zakura.log"   # deterministic log path
state_cache_dir = "/var/lib/zakura"
# manage_config = true                       # false = only swap the binary + restart the existing
#                                            # service, leaving config/unit/cache untouched (systemd only)
network         = "Mainnet"
listen_addr     = "[::]:8233"
# identity_dir  = "/root/.zakura"           # empty = zakurad default; pins the iroh node_id
rpc_listen_addr = ""                        # empty = RPC disabled; e.g. "0.0.0.0:8232"
storage_mode    = "archive"                 # "archive" serves all history; "pruned" does not
p2p_stack       = "dual"                     # legacy | zakura | dual | default
# port          = 22                        # optional non-default ssh port

# Optional fleet-wide Zakura settings, rendered into [network.zakura] on every
# node. Use for a private dev cohort: same dev_network tag + the same bootstrap
# peers isolate the fleet's v2 overlay (see deploy/runner/ for the perf harness).
# [defaults.zakura]
# listen_addr     = "0.0.0.0:8234"          # NOT loopback (iroh single-socket)
# dev_network     = "my-cohort"             # same string on every cohort node
# bootstrap_peers = ["nodeid@1.2.3.4:8234"] # node_id@addr of the other peers

[[nodes]]
name       = "node-a"
ssh_string = "root@167.99.162.47"
commit     = "evan/perf-note-commit-tree"   # branch, tag, or full/short SHA

[[nodes]]
name       = "node-b"
ssh_string = "root@167.172.201.36"
commit     = "evan/perf-note-commit-tree"

# Process-managed nodes skip systemd unit installation. Use this only when a
