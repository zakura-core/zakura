# This workflow builds and publishes zakurad release assets and Docker images
# when a release is published.
name: Release binaries

on:
  push:
    tags:
      - "v*"
  release:
    types:
      - released
  workflow_dispatch:
    inputs:
      release_tag:
        description: "Release tag to build and publish assets for (for example v0.0.1-alpha.1)"
        required: false
        type: string
      publish_assets_to_release:
        description: "Upload zakurad assets to the GitHub release tag (use to repair an existing release)"
        required: false
        type: boolean
        default: false
      publish_docker_to_dockerhub:
        description: "Publish Docker images to Docker Hub"
        required: false
        type: boolean
        default: false

permissions:
  contents: read

jobs:
  resolve-release:
    name: Resolve release metadata
    runs-on: ubuntu-latest
    outputs:
      release_tag: ${{ steps.resolve.outputs.release_tag }}
      checkout_ref: ${{ steps.resolve.outputs.checkout_ref }}
    steps:
      - name: Resolve release tag
        id: resolve
        env:
          EVENT_NAME: ${{ github.event_name }}
          REF_NAME: ${{ github.ref_name }}
          REF_TYPE: ${{ github.ref_type }}
          INPUT_RELEASE_TAG: ${{ inputs.release_tag }}
          EVENT_RELEASE_TAG: ${{ github.event.release.tag_name }}
          GITHUB_SHA: ${{ github.sha }}
        run: |
          set -euo pipefail
          if [ "$EVENT_NAME" = "release" ]; then
            release_tag="$EVENT_RELEASE_TAG"
            checkout_ref="$EVENT_RELEASE_TAG"
          elif [ "$REF_TYPE" = "tag" ]; then
            release_tag="$REF_NAME"
            checkout_ref="$REF_NAME"
          else
            release_tag="$INPUT_RELEASE_TAG"
            # workflow_dispatch builds from the release tag so republished assets
            # match the tagged source tree (older tags may still ship a zebrad
            # binary, which the packaging step renames to zakurad).
            if [ -n "$release_tag" ]; then
              checkout_ref="$release_tag"
            else
              checkout_ref="$GITHUB_SHA"
            fi
          fi

          if [ -z "$release_tag" ]; then
            echo "A release tag is required. Set workflow_dispatch input release_tag." >&2
            exit 1
          fi

          echo "release_tag=$release_tag" >> "$GITHUB_OUTPUT"
          echo "checkout_ref=$checkout_ref" >> "$GITHUB_OUTPUT"

  resolve-zcashd-compat-manifest:
    name: Resolve zcashd compat manifest
    runs-on: ubuntu-latest
    needs: [resolve-release]
    outputs:
      manifest_path: ${{ steps.resolve.outputs.manifest_path }}
      release_tag: ${{ steps.resolve.outputs.release_tag }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd #v6.0.2
        with:
          persist-credentials: false
          ref: ${{ needs.resolve-release.outputs.checkout_ref }}

      - name: Resolve and parse manifest
        id: resolve
        run: |
          set -euo pipefail
          ./scripts/resolve-zcashd-compat-manifest.sh \
            --write-github-output \
            --require-targets x86_64-pc-linux-gnu

  build-zakurad-assets:
    name: Build zakurad assets (${{ matrix.name }})
    runs-on: ${{ matrix.runner }}
    needs: [resolve-release]
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: linux-x86_64
            runner: ${{ vars.DOCKER_BUILD_RUNNER_AMD64 || 'ubuntu-latest' }}
            platform: linux/amd64
            target_triple: x86_64-unknown-linux-gnu
          - name: linux-aarch64
            runner: ${{ vars.DOCKER_BUILD_RUNNER_ARM64 || 'ubuntu-24.04-arm' }}
            platform: linux/arm64
            target_triple: aarch64-unknown-linux-gnu
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd #v6.0.2
        with:
          persist-credentials: false
          ref: ${{ needs.resolve-release.outputs.checkout_ref }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@4d04d5d9486b7bd6fa91e7baf45bbb4f8b9deedd #v4.0.0 # zizmor: ignore[cache-poisoning] -- shared Docker Build Cloud cache across envs, isolation fix pending
        with:
          version: lab:latest
          driver: docker

      - name: Build release binary
        env:
          FEATURES: ${{ vars.RUST_PROD_FEATURES || 'default-release-binaries' }}
        run: |
          set -euo pipefail
          mkdir -p ./out
          docker buildx build \
            --platform "${{ matrix.platform }}" \
            --target release \
            --file ./docker/Dockerfile \
            --build-arg "FEATURES=${FEATURES}" \
            --output "type=local,dest=./out" \
            .
          if [ -x ./out/usr/local/bin/zakurad ]; then
            echo "release_binary=zakurad" >> "$GITHUB_ENV"
          elif [ -x ./out/usr/local/bin/zebrad ]; then
            echo "release_binary=zebrad" >> "$GITHUB_ENV"
          else
            echo "Expected ./out/usr/local/bin/zakurad or ./out/usr/local/bin/zebrad" >&2
            exit 1
          fi

      - name: Validate binary
        run: ./out/usr/local/bin/${{ env.release_binary }} --version

      - name: Package archive and metadata
        env:
          RELEASE_TAG: ${{ needs.resolve-release.outputs.release_tag }}
          RELEASE_BINARY: ${{ env.release_binary }}
        run: |
          set -euo pipefail
          mkdir -p ./artifacts/bin ./artifacts/metadata
          cp "./out/usr/local/bin/${RELEASE_BINARY}" ./artifacts/bin/zakurad
          cp "./out/usr/local/bin/${RELEASE_BINARY}" ./artifacts/bin/zebrad
          archive_name="zakurad-${RELEASE_TAG}-${{ matrix.name }}.tar.gz"
          (
            cd ./artifacts
            tar --sort=name \
              --mtime='UTC 2020-01-01' \
              --owner=0 --group=0 --numeric-owner \
              -czf "$archive_name" ./bin/zakurad ./bin/zebrad
          )
          archive_sha256="$(sha256sum "./artifacts/${archive_name}" | awk '{print $1}')"
          archive_size="$(stat --printf='%s' "./artifacts/${archive_name}")"
          cat > "./artifacts/metadata/${{ matrix.name }}.metadata.json" <<EOF
          {
            "platform_id": "${{ matrix.name }}",
            "target_triple": "${{ matrix.target_triple }}",
            "archive": "${archive_name}",
            "sha256": "${archive_sha256}",
            "size": ${archive_size},
            "archive_member_binary_path": "./bin/zakurad",
            "legacy_archive_member_binary_path": "./bin/zebrad"
          }
          EOF

      - name: Upload matrix artifacts
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a #v7.0.1
        with:
          name: zakurad-assets-${{ matrix.name }}
          path: ./artifacts

  publish-zakurad-assets:
    name: Publish zakurad assets
    needs: [resolve-release, build-zakurad-assets]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    if: github.event_name == 'release' || startsWith(github.ref, 'refs/tags/v') || inputs.publish_assets_to_release
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd #v6.0.2
        with:
          persist-credentials: false
          ref: ${{ needs.resolve-release.outputs.checkout_ref }}

      - name: Download built artifacts
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c #v8.0.1
        with:
          path: ./publish
          pattern: zakurad-assets-*
          merge-multiple: true

      - name: Build manifest and checksums
        env:
          RELEASE_TAG: ${{ needs.resolve-release.outputs.release_tag }}
          REPOSITORY: ${{ github.repository }}
        run: |
          set -euo pipefail
          mkdir -p ./publish/final
          RELEASE_TAG="$RELEASE_TAG" REPOSITORY="$REPOSITORY" python3 - <<'PY'
          import glob
          import json
          import os
          from pathlib import Path

          release_tag = os.environ["RELEASE_TAG"]
          repository = os.environ["REPOSITORY"]
          base_url = f"https://github.com/{repository}/releases/download/{release_tag}"
          metadata_files = sorted(glob.glob("./publish/**/*.metadata.json", recursive=True))
          if not metadata_files:
              raise SystemExit("No metadata files found.")

          artifacts = []
          x86_sha256 = ""
          for file_path in metadata_files:
              item = json.loads(Path(file_path).read_text(encoding="utf-8"))
              item["url"] = f"{base_url}/{item['archive']}"
              artifacts.append(item)
              if item.get("platform_id") == "linux-x86_64":
                  x86_sha256 = item.get("sha256", "")

          manifest = {
              "schema_version": 1,
              "release_tag": release_tag,
              "repository": repository,
              "artifacts": artifacts,
          }
          Path("./publish/final").mkdir(parents=True, exist_ok=True)
          Path(f"./publish/final/zakurad-manifest-{release_tag}.json").write_text(
              json.dumps(manifest, indent=2, sort_keys=True) + "\n",
              encoding="utf-8",
          )
          if not x86_sha256:
              raise SystemExit("Missing linux-x86_64 archive sha256 in metadata.")
          Path("./publish/final/x86_64.sha256").write_text(x86_sha256 + "\n", encoding="utf-8")
          PY

          find ./publish -type f -name 'zakurad-*.tar.gz' -exec cp {} ./publish/final/ \;
          cp ./scripts/install-zakura.sh ./publish/final/
          RELEASE_TAG="$RELEASE_TAG" python3 - <<'PY'
          import os
          import re
          from pathlib import Path

          release_tag = os.environ["RELEASE_TAG"]
          image_version = release_tag.removeprefix("v")
          x86_sha256 = Path("./publish/final/x86_64.sha256").read_text(encoding="utf-8").strip()
          installers = {
              "install-zakura.sh": {
                  "ZAKURA_RELEASE_TAG": release_tag,
                  "ZAKURA_ARCHIVE_SHA256": x86_sha256,
                  "ZAKURA_DOCKER_IMAGE": f"valargroup/zakura:{image_version}",
                  "ZAKURA_COMPAT_DOCKER_IMAGE": f"valargroup/zakura:zcashd-compat-{image_version}",
              },
          }
          for filename, replacements in installers.items():
              installer_path = Path("./publish/final") / filename
              installer = installer_path.read_text(encoding="utf-8")
              for name, value in replacements.items():
                  installer, count = re.subn(
                      rf'^{name}="[^"]*"$',
                      f'{name}="{value}"',
                      installer,
                      count=1,
                      flags=re.MULTILINE,
                  )
                  if count != 1:
                      raise SystemExit(f"Expected exactly one {name} assignment in {filename}.")
              installer_path.write_text(installer, encoding="utf-8")
          PY
          (
            cd ./publish/final
            rm -f SHA256SUMS.txt
            sha256sum ./* > ../SHA256SUMS.txt
            mv ../SHA256SUMS.txt SHA256SUMS.txt
          )

      - name: Ensure release exists
        env:
          EVENT_NAME: ${{ github.event_name }}
          REF_TYPE: ${{ github.ref_type }}
          GH_TOKEN: ${{ github.token }}
          REPOSITORY: ${{ github.repository }}
          RELEASE_TAG: ${{ needs.resolve-release.outputs.release_tag }}
          TARGET_REF: ${{ needs.resolve-release.outputs.checkout_ref }}
        run: |
          set -euo pipefail
          if gh release view "$RELEASE_TAG" --repo "$REPOSITORY" >/dev/null 2>&1; then
            exit 0
          fi

          if [ "$EVENT_NAME" != "workflow_dispatch" ] && [ "$REF_TYPE" != "tag" ]; then
            echo "Release $RELEASE_TAG does not exist." >&2
            exit 1
          fi

          release_flags=()
          release_notes="Release created by release-binaries."
          if [ "$EVENT_NAME" = "workflow_dispatch" ]; then
            release_flags+=(--draft --prerelease)
            release_notes="Temporary release created by release-binaries workflow_dispatch."
          elif [[ "$RELEASE_TAG" == *-* ]]; then
            release_flags+=(--prerelease)
          fi

          target_commitish="$(git rev-parse --verify "${TARGET_REF}^{commit}")"
          gh release create "$RELEASE_TAG" \
            --repo "$REPOSITORY" \
            --target "$target_commitish" \
            --title "$RELEASE_TAG" \
            --notes "$release_notes" \
            "${release_flags[@]}"

      - name: Upload assets to release
        env:
          GH_TOKEN: ${{ github.token }}
          REPOSITORY: ${{ github.repository }}
          RELEASE_TAG: ${{ needs.resolve-release.outputs.release_tag }}
        run: |
          set -euo pipefail
          # Drop stale pre-rename assets so installers only see zakurad archives.
          legacy_assets=(
            "zebrad-${RELEASE_TAG}-linux-x86_64.tar.gz"
            "zebrad-${RELEASE_TAG}-linux-aarch64.tar.gz"
            "zebrad-manifest-${RELEASE_TAG}.json"
          )
          for asset in "${legacy_assets[@]}"; do
            gh release delete-asset "$RELEASE_TAG" "$asset" --repo "$REPOSITORY" --yes 2>/dev/null || true
          done

          gh release upload "$RELEASE_TAG" \
            ./publish/final/zakurad-*.tar.gz \
            ./publish/final/zakurad-manifest-*.json \
            ./publish/final/install-zakura.sh \
            ./publish/final/SHA256SUMS.txt \
            --repo "$REPOSITORY" \
            --clobber

  build:
    name: Build Release Docker (${{ matrix.name }})
    needs: [resolve-release]
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: linux-x86_64
            runner: ${{ vars.DOCKER_BUILD_RUNNER_AMD64 || 'ubuntu-latest' }}
            platform: linux/amd64
            docker_tag_suffix: amd64
          - name: linux-aarch64
            runner: ${{ vars.DOCKER_BUILD_RUNNER_ARM64 || 'ubuntu-24.04-arm' }}
            platform: linux/arm64
            docker_tag_suffix: arm64
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd #v6.0.2
        with:
          persist-credentials: false
          ref: ${{ needs.resolve-release.outputs.checkout_ref }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@4d04d5d9486b7bd6fa91e7baf45bbb4f8b9deedd #v4.0.0 # zizmor: ignore[cache-poisoning] -- shared Docker Build Cloud cache across envs, isolation fix pending
        with:
          version: lab:latest
          driver: docker

      - name: Login to DockerHub
        if: github.event_name == 'release' || startsWith(github.ref, 'refs/tags/v') || inputs.publish_docker_to_dockerhub
        uses: docker/login-action@4907a6ddec9925e35a0a9e82d7399ccc52663121 #v4.1.0
        with:
          username: valargroup
          password: ${{ secrets.DOCKERHUB_TOKEN_VALARGROUP }}

      - name: Build runtime image
        if: github.event_name != 'release' && !startsWith(github.ref, 'refs/tags/v') && !inputs.publish_docker_to_dockerhub
        env:
          FEATURES: ${{ vars.RUST_PROD_FEATURES || 'default-release-binaries' }}
          IMAGE_TAG: valargroup/zakura:release-ci-${{ matrix.name }}
        run: |
          set -euo pipefail
          docker buildx build \
            --platform "${{ matrix.platform }}" \
            --target runtime \
            --file ./docker/Dockerfile \
            --build-arg "FEATURES=${FEATURES}" \
            --tag "$IMAGE_TAG" \
            --load \
            .
          docker image inspect "$IMAGE_TAG" >/dev/null

      - name: Build and push runtime image
        if: github.event_name == 'release' || startsWith(github.ref, 'refs/tags/v') || inputs.publish_docker_to_dockerhub
        env:
          FEATURES: ${{ vars.RUST_PROD_FEATURES || 'default-release-binaries' }}
          RELEASE_TAG: ${{ needs.resolve-release.outputs.release_tag }}
          DOCKER_TAG_SUFFIX: ${{ matrix.docker_tag_suffix }}
        run: |
          set -euo pipefail
          image_version="${RELEASE_TAG#v}"
          docker buildx build \
            --platform "${{ matrix.platform }}" \
            --target runtime \
            --file ./docker/Dockerfile \
            --build-arg "FEATURES=${FEATURES}" \
            --tag "valargroup/zakura:${image_version}-${DOCKER_TAG_SUFFIX}" \
            --push \
            .

  publish-docker-manifest:
    name: Publish Docker multi-arch manifest
    if: github.event_name == 'release' || startsWith(github.ref, 'refs/tags/v') || inputs.publish_docker_to_dockerhub
    runs-on: ubuntu-latest
    needs: [resolve-release, build]
    steps:
      - name: Login to DockerHub
        uses: docker/login-action@4907a6ddec9925e35a0a9e82d7399ccc52663121 #v4.1.0
        with:
          username: valargroup
          password: ${{ secrets.DOCKERHUB_TOKEN_VALARGROUP }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@4d04d5d9486b7bd6fa91e7baf45bbb4f8b9deedd #v4.0.0

      - name: Create and verify Docker manifest
        env:
          EVENT_NAME: ${{ github.event_name }}
          RELEASE_TAG: ${{ needs.resolve-release.outputs.release_tag }}
        run: |
          set -euo pipefail
          image_version="${RELEASE_TAG#v}"
          tags=(-t "valargroup/zakura:${image_version}")
          if [ "$EVENT_NAME" = "release" ]; then
            tags+=(-t "valargroup/zakura:latest")
          fi

          docker buildx imagetools create \
            "${tags[@]}" \
            "valargroup/zakura:${image_version}-amd64" \
            "valargroup/zakura:${image_version}-arm64"

          docker buildx imagetools inspect "valargroup/zakura:${image_version}" \
            --format '{{json .Manifest}}' \
            | jq -e '
                [ .manifests[].platform | "\(.os)/\(.architecture)" ] as $platforms
                | ($platforms | index("linux/amd64")) != null and ($platforms | index("linux/arm64")) != null
              ' >/dev/null

  build-zcashd-compat:
    name: Build Release Docker zcashd Compat (${{ matrix.name }})
    runs-on: ${{ matrix.runner }}
    needs: [resolve-release, resolve-zcashd-compat-manifest]
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: linux-x86_64
            runner: ${{ vars.DOCKER_BUILD_RUNNER_AMD64 || 'ubuntu-latest' }}
            platform: linux/amd64
            docker_tag_suffix: amd64
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd #v6.0.2
        with:
          persist-credentials: false
          ref: ${{ needs.resolve-release.outputs.checkout_ref }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@4d04d5d9486b7bd6fa91e7baf45bbb4f8b9deedd #v4.0.0 # zizmor: ignore[cache-poisoning] -- shared Docker Build Cloud cache across envs, isolation fix pending
        with:
          version: lab:latest
          driver: docker

      - name: Login to DockerHub
        if: github.event_name == 'release' || startsWith(github.ref, 'refs/tags/v') || inputs.publish_docker_to_dockerhub
        uses: docker/login-action@4907a6ddec9925e35a0a9e82d7399ccc52663121 #v4.1.0
        with:
          username: valargroup
          password: ${{ secrets.DOCKERHUB_TOKEN_VALARGROUP }}

      - name: Prepare zcashd compat build context
        env:
          DOCKER_PLATFORM: ${{ matrix.platform }}
        run: |
          set -euo pipefail
          ./scripts/resolve-zcashd-compat-manifest.sh \
            --prepare-build-context "${RUNNER_TEMP}/zcashd-compat-context" \
            --platform "$DOCKER_PLATFORM"

      - name: Build zcashd compat runtime image
        if: github.event_name != 'release' && !startsWith(github.ref, 'refs/tags/v') && !inputs.publish_docker_to_dockerhub
        env:
          FEATURES: ${{ vars.RUST_PROD_FEATURES || 'default-release-binaries' }}
          IMAGE_TAG: valargroup/zakura:zcashd-compat-release-ci-${{ matrix.name }}
        run: |
          set -euo pipefail
          docker buildx build \
            --platform "${{ matrix.platform }}" \
            --target runtime-zcashd-compat \
            --file ./docker/Dockerfile \
            --build-context "zcashd_compat=${RUNNER_TEMP}/zcashd-compat-context" \
            --build-arg "FEATURES=${FEATURES}" \
            --tag "$IMAGE_TAG" \
            --load \
            .
          docker image inspect "$IMAGE_TAG" >/dev/null

      - name: Build and push zcashd compat runtime image
        if: github.event_name == 'release' || startsWith(github.ref, 'refs/tags/v') || inputs.publish_docker_to_dockerhub
        env:
          FEATURES: ${{ vars.RUST_PROD_FEATURES || 'default-release-binaries' }}
          RELEASE_TAG: ${{ needs.resolve-release.outputs.release_tag }}
          DOCKER_TAG_SUFFIX: ${{ matrix.docker_tag_suffix }}
        run: |
          set -euo pipefail
          image_version="${RELEASE_TAG#v}"
          docker buildx build \
            --platform "${{ matrix.platform }}" \
            --target runtime-zcashd-compat \
            --file ./docker/Dockerfile \
            --build-context "zcashd_compat=${RUNNER_TEMP}/zcashd-compat-context" \
            --build-arg "FEATURES=${FEATURES}" \
            --tag "valargroup/zakura:zcashd-compat-${image_version}-${DOCKER_TAG_SUFFIX}" \
            --push \
            .

  publish-zcashd-compat-docker-manifest:
    name: Publish zcashd compat Docker amd64 manifest
    if: github.event_name == 'release' || startsWith(github.ref, 'refs/tags/v') || inputs.publish_docker_to_dockerhub
    runs-on: ubuntu-latest
    needs: [resolve-release, resolve-zcashd-compat-manifest, build-zcashd-compat]
    steps:
      - name: Login to DockerHub
        uses: docker/login-action@4907a6ddec9925e35a0a9e82d7399ccc52663121 #v4.1.0
        with:
          username: valargroup
          password: ${{ secrets.DOCKERHUB_TOKEN_VALARGROUP }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@4d04d5d9486b7bd6fa91e7baf45bbb4f8b9deedd #v4.0.0

      - name: Create and verify zcashd compat Docker manifest
        env:
          EVENT_NAME: ${{ github.event_name }}
          RELEASE_TAG: ${{ needs.resolve-release.outputs.release_tag }}
        run: |
          set -euo pipefail
          image_version="${RELEASE_TAG#v}"
          tags=(-t "valargroup/zakura:zcashd-compat-${image_version}")
          if [ "$EVENT_NAME" = "release" ]; then
            tags+=(-t "valargroup/zakura:zcashd-compat-latest")
          fi

          docker buildx imagetools create \
            "${tags[@]}" \
            "valargroup/zakura:zcashd-compat-${image_version}-amd64"

          docker buildx imagetools inspect "valargroup/zakura:zcashd-compat-${image_version}" \
            --format '{{json .Manifest}}' \
            | jq -e '
                [ .manifests[].platform | "\(.os)/\(.architecture)" ] as $platforms
                | $platforms == ["linux/amd64"]
              ' >/dev/null

  release-binaries-success:
    name: Release binaries success
    runs-on: ubuntu-latest
    if: always()
    needs:
      - resolve-release
      - resolve-zcashd-compat-manifest
      - build-zakurad-assets
      - publish-zakurad-assets
      - build
      - publish-docker-manifest
      - build-zcashd-compat
      - publish-zcashd-compat-docker-manifest
    timeout-minutes: 1
    steps:
      - name: Decide whether the needed jobs succeeded or failed
        uses: re-actors/alls-green@05ac9388f0aebcb5727afa17fcccfecd6f8ec5fe #v1.2.2
        with:
          jobs: ${{ toJSON(needs) }}
          allowed-skips: publish-zakurad-assets,publish-docker-manifest
