name: Header-chain fuzzing

on:
  push:
    branches: [main]
  merge_group:
  # Run the normative budgets Monday through Saturday and a longer campaign on Sunday.
  schedule:
    - cron: "13 5 * * 1-6"
    - cron: "13 5 * * 0"
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always
  CARGO_FUZZ_VERSION: 0.13.2
  HEADER_FUZZ_NIGHTLY: nightly-2026-07-15
  RUST_BACKTRACE: 1
  CXXFLAGS: -include cstdint

jobs:
  regressions:
    name: Deterministic corpus
    if: github.event_name == 'push' || github.event_name == 'merge_group'
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 #v7.0.0
        with:
          persist-credentials: false
      - uses: actions-rust-lang/setup-rust-toolchain@166cdcfd11aee3cb47222f9ddb555ce30ddb9659 #v1.17.0
        with:
          toolchain: stable
          cache: true
          cache-on-failure: true
      - uses: ./.github/actions/setup-zakura-build
      - uses: taiki-e/install-action@43aecc8d72668fbcfe75c31400bc4f890f1c5853 #v2.83.2
        with:
          tool: nextest
      - name: Replay checked-in corpus
        run: cargo nextest run --profile zakura-header-fuzz-regressions --locked

  fuzz:
    name: ${{ matrix.target }}
    if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    timeout-minutes: 180
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: fork_transitions
            seconds: 1800
            weekly_seconds: 7200
            rss_mb: 4096
            max_len: 512
          - target: header_codec
            seconds: 900
            weekly_seconds: 3600
            rss_mb: 2048
            max_len: 2097152
          - target: header_pursuit
            seconds: 900
            weekly_seconds: 3600
            rss_mb: 2048
            max_len: 512
          - target: recovery_rows
            seconds: 900
            weekly_seconds: 3600
            rss_mb: 4096
            max_len: 256

    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 #v7.0.0
        with:
          persist-credentials: false
      - uses: actions-rust-lang/setup-rust-toolchain@166cdcfd11aee3cb47222f9ddb555ce30ddb9659 #v1.17.0
        with:
          toolchain: ${{ env.HEADER_FUZZ_NIGHTLY }}
          cache: true
          cache-on-failure: true
      - uses: ./.github/actions/setup-zakura-build
      - name: Install pinned cargo-fuzz
        run: cargo install cargo-fuzz --version "${CARGO_FUZZ_VERSION}" --locked
      - name: Run bounded campaign
        working-directory: fuzz/header-chain
        env:
          NORMAL_SECONDS: ${{ matrix.seconds }}
          WEEKLY_SECONDS: ${{ matrix.weekly_seconds }}
          SCHEDULE: ${{ github.event.schedule }}
          TARGET: ${{ matrix.target }}
          RSS_MB: ${{ matrix.rss_mb }}
          MAX_LEN: ${{ matrix.max_len }}
        run: |
          seconds="${NORMAL_SECONDS}"
          if [ "${SCHEDULE}" = "13 5 * * 0" ]; then
            seconds="${WEEKLY_SECONDS}"
          fi
          cargo fuzz run --locked "${TARGET}" -- \
            -max_total_time="${seconds}" \
            -rss_limit_mb="${RSS_MB}" \
            -max_len="${MAX_LEN}"
      - name: Upload crash and reviewed-corpus candidates
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a #v7.0.1
        with:
          name: header-fuzz-${{ matrix.target }}-${{ github.run_id }}
          if-no-files-found: ignore
          retention-days: 14
          path: |
            fuzz/header-chain/artifacts/${{ matrix.target }}
            fuzz/header-chain/corpus/${{ matrix.target }}
